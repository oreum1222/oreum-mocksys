<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<meta name="theme-color" content="#0a0e0a" />
<meta name="format-detection" content="telephone=no" />
<title>오름 국어 — 2026학년도 5월 학평 진단 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
:root {
  --bg-deep: #0a0e0a;
  --bg-card: #131815;
  --bg-card-2: #1a201c;
  --bg-input: #0f1411;
  --green-deep: #4a5a3a;
  --green-mid: #5a6a4a;
  --green-light: #7d8e5e;
  --green-accent: #a4b87a;
  --gold: #c9a84c;
  --gold-soft: #b09740;
  --cream: #f4ede0;
  --text-primary: #ece8e0;
  --text-secondary: #a8a496;
  --text-muted: #7a7668;
  --text-dim: #4d4a3f;
  --wrong: #d97757;
  --border-outer: #2a3128;
  --border-inner: #1f2520;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg-deep); color: var(--text-primary); font-family: "Noto Sans KR", sans-serif; -webkit-font-smoothing: antialiased; min-height: 100vh; }
.container { max-width: 1280px; margin: 0 auto; padding: 32px 24px 64px; }

/* 헤더 */
.dash-header { display: flex; justify-content: space-between; align-items: flex-end; padding-bottom: 24px; border-bottom: 1px solid var(--border-outer); margin-bottom: 28px; }
.dash-brand { font-family: "Noto Serif KR", serif; font-weight: 700; font-size: 25px; color: var(--cream); letter-spacing: -0.5px; }
.dash-brand .accent { color: var(--gold); font-family: "Noto Serif KR", serif; font-weight: 500; }
.dash-sub { color: var(--text-secondary); font-size: 15px; margin-top: 4px; }
.dash-controls { display: flex; align-items: center; gap: 12px; }
.refresh-btn {
  background: var(--bg-card); border: 1px solid var(--border-outer); color: var(--text-primary);
  padding: 10px 16px; border-radius: 4px; font-family: "Noto Sans KR", sans-serif; font-size: 15px;
  cursor: pointer; transition: all .2s;
}
.refresh-btn:hover { border-color: var(--green-accent); color: var(--green-accent); }
.refresh-btn.loading { opacity: 0.6; cursor: wait; }

/* 통계 박스 */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px; }
@media (max-width: 720px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }

/* 모바일 — 대시보드 */
@media (max-width: 600px) {
  .dash-shell { padding: 18px 14px 60px; }
  .dash-header { flex-direction: column; align-items: flex-start; gap: 14px; }
  .dash-brand { font-size: 22px; }
  .dash-brand .accent { font-size: 18px; }
  .stats-row { grid-template-columns: 1fr 1fr; gap: 10px; }
  .stat-card { padding: 14px 12px; }
  .stat-card .label { font-size: 11px; }
  .stat-card .value { font-size: 28px; }

  /* 표 가로 스크롤 처리 */
  .submissions-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .submissions-table { font-size: 13px; min-width: 720px; }
  .submissions-table th, .submissions-table td { padding: 10px 8px; }
  .submissions-table .col-grade { font-size: 18px; }
  .submissions-table .col-score { font-size: 16px; }

  /* 디테일 영역 */
  .detail-content { padding: 16px 14px; }
  .detail-block h4 { font-size: 13px; }
  .detail-block .row { font-size: 13px; }

  /* 비밀번호 입력창 */
  .login-shell input { font-size: 16px; }  /* iOS 자동 줌 방지 */
}
.stat-card {
  background: var(--bg-card); border: 1px solid var(--border-outer); border-radius: 6px;
  padding: 16px 18px;
}
.stat-card .label { color: var(--text-muted); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.stat-card .value { font-family: "Noto Sans KR", sans-serif; font-weight: 700; font-size: 36px; color: var(--gold); line-height: 1; letter-spacing: -0.02em; }
.stat-card .sub { color: var(--text-secondary); font-size: 12px; margin-top: 4px; }

/* 필터 */
.filter-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.filter-row input, .filter-row select {
  background: var(--bg-input); border: 1px solid var(--border-outer); color: var(--text-primary);
  padding: 8px 12px; border-radius: 4px; font-family: "Noto Sans KR", sans-serif; font-size: 15px;
}
.filter-row input { min-width: 220px; }
.filter-row label { color: var(--text-muted); font-size: 13px; }

/* 테이블 */
.submissions-table {
  width: 100%; border-collapse: separate; border-spacing: 0;
  background: var(--bg-card); border: 1px solid var(--border-outer); border-radius: 6px; overflow: hidden;
}
.submissions-table thead { background: var(--bg-card-2); }
.submissions-table th, .submissions-table td {
  padding: 12px 14px; text-align: left; font-size: 15px; border-bottom: 1px solid var(--border-inner);
  vertical-align: middle;
}
.submissions-table th {
  color: var(--gold); font-weight: 500; text-transform: uppercase; letter-spacing: 0.6px;
  font-size: 12px; font-family: "Noto Sans KR", sans-serif; font-weight: 500;
}
.submissions-table tbody tr { cursor: pointer; transition: background .15s; }
.submissions-table tbody tr:hover { background: rgba(125, 142, 94, 0.05); }
.submissions-table tbody tr.expanded { background: rgba(201, 168, 76, 0.05); }
.submissions-table tbody tr.expanded + tr.detail-row { display: table-row; }
.submissions-table .col-name { font-family: "Noto Serif KR", serif; font-weight: 500; color: var(--cream); }
.submissions-table .col-grade {
  font-family: "Noto Sans KR", sans-serif; font-weight: 700; font-size: 22px;
  text-align: center;
}
.submissions-table .col-grade.g1 { color: var(--green-accent); }
.submissions-table .col-grade.g2 { color: var(--green-light); }
.submissions-table .col-grade.g3, .submissions-table .col-grade.g4 { color: var(--gold); }
.submissions-table .col-grade.g5, .submissions-table .col-grade.g6, .submissions-table .col-grade.g7 { color: var(--wrong); }
.submissions-table .col-score { font-family: "Noto Sans KR", sans-serif; font-weight: 600; font-size: 20px; color: var(--text-primary); }
.submissions-table .col-wrong { color: var(--text-secondary); font-size: 13px; }
.submissions-table .col-pattern { color: var(--green-accent); font-size: 13px; }
.submissions-table .col-date { color: var(--text-muted); font-size: 13px; font-family: "Noto Sans KR", sans-serif; }
.col-choice { font-size: 12px; color: var(--text-secondary); }

/* 상세 뷰 */
.detail-row { display: none; }
.detail-row td { padding: 0 !important; background: var(--bg-input); border-bottom: 1px solid var(--border-outer); }
.detail-content { padding: 22px 28px; display: grid; grid-template-columns: 1fr 1.4fr; gap: 24px; }
@media (max-width: 880px) { .detail-content { grid-template-columns: 1fr; } }
.detail-left, .detail-right { display: flex; flex-direction: column; gap: 18px; }
.detail-block {
  background: var(--bg-card); border: 1px solid var(--border-inner); border-radius: 4px;
  padding: 16px 18px;
}
.detail-block h4 {
  font-family: "Noto Sans KR", sans-serif; font-weight: 600; font-size: 16px;
  color: var(--gold); margin-bottom: 10px; font-weight: 500; letter-spacing: 0.5px;
  text-transform: uppercase;
}
.detail-block .row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 15px; }
.detail-block .row .key { color: var(--text-muted); }
.detail-block .row .val { color: var(--text-primary); }

.wrong-numbers { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.wrong-num {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 32px; padding: 4px 6px; border-radius: 3px;
  background: rgba(217, 119, 87, 0.1); border: 1px solid rgba(217, 119, 87, 0.3);
  color: var(--wrong); font-size: 13px; font-weight: 500;
}
.wrong-num.three-pt { border-color: var(--gold); color: var(--gold); position: relative; }
.wrong-num.three-pt::before { content: "3"; position: absolute; top: -3px; right: -3px; font-size: 9px; background: var(--gold); color: var(--bg-deep); padding: 0 3px; border-radius: 2px; }
.wrong-num.high-wr { background: rgba(217, 119, 87, 0.2); }
.wrong-num.low-wr { background: rgba(217, 119, 87, 0.05); border-color: rgba(217, 119, 87, 0.2); }

.parent-comment-box {
  background: var(--bg-card-2);
  border-left: 3px solid var(--gold);
  padding: 18px 22px;
  border-radius: 0 4px 4px 0;
  font-family: "Noto Serif KR", serif;
  color: var(--text-primary);
  line-height: 1.85;
  font-size: 15px;
  white-space: pre-wrap;
  position: relative;
}
.parent-comment-box .copy-btn {
  position: absolute; top: 12px; right: 12px;
  background: var(--bg-card); border: 1px solid var(--border-outer); color: var(--text-secondary);
  padding: 5px 10px; border-radius: 3px; font-size: 12px; cursor: pointer; font-family: "Noto Sans KR", sans-serif;
  transition: all .2s;
}
.parent-comment-box .copy-btn:hover { color: var(--gold); border-color: var(--gold); }
.parent-comment-box .copy-btn.copied { color: var(--green-accent); border-color: var(--green-accent); }

.flag-tag {
  display: inline-block; padding: 3px 8px; border-radius: 3px; font-size: 12px;
  background: rgba(201, 168, 76, 0.1); border: 1px solid rgba(201, 168, 76, 0.3);
  color: var(--gold); margin-right: 5px; margin-top: 4px;
}

.empty-state, .error-state, .loading-state {
  text-align: center; padding: 60px 20px; color: var(--text-muted);
}
.empty-state .ico, .error-state .ico, .loading-state .ico { font-size: 40px; margin-bottom: 12px; }
.empty-state .msg, .error-state .msg, .loading-state .msg { font-size: 16px; }

/* 보기 토글 */
.view-toggle {
  display: inline-flex; gap: 0; border: 1px solid var(--border-outer); border-radius: 4px;
  overflow: hidden;
}
.view-toggle button {
  background: var(--bg-card); border: none; color: var(--text-secondary);
  padding: 8px 14px; font-family: "Noto Sans KR", sans-serif; font-size: 13px; cursor: pointer;
}
.view-toggle button.on { background: var(--green-deep); color: var(--cream); }

.toast {
  position: fixed; bottom: 30px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--bg-deep); border: 1px solid var(--green-accent); color: var(--green-accent);
  padding: 12px 20px; border-radius: 4px; font-size: 15px;
  opacity: 0; pointer-events: none; transition: all .3s; z-index: 9999;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* 보안 lock */
.lock-screen {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: var(--bg-deep); z-index: 10000;
  display: flex; align-items: center; justify-content: center; flex-direction: column;
}
.lock-box {
  background: var(--bg-card); border: 1px solid var(--gold); border-radius: 6px;
  padding: 32px 36px; text-align: center; max-width: 360px;
}
.lock-box h2 { font-family: "Noto Serif KR", serif; color: var(--gold); margin-bottom: 8px; font-size: 20px; }
.lock-box p { color: var(--text-secondary); font-size: 15px; margin-bottom: 18px; }
.lock-box input {
  width: 100%; background: var(--bg-input); border: 1px solid var(--border-outer);
  color: var(--text-primary); padding: 10px 12px; border-radius: 4px; margin-bottom: 12px;
  font-family: "Noto Sans KR", sans-serif; font-size: 16px;
  text-align: center; letter-spacing: 2px;
}
.lock-box button {
  width: 100%; background: var(--green-deep); border: none; color: var(--cream);
  padding: 11px; border-radius: 4px; cursor: pointer; font-family: "Noto Serif KR", serif;
  font-size: 16px; font-weight: 500;
}
.lock-box .err { color: var(--wrong); font-size: 13px; margin-top: 8px; min-height: 16px; }
</style>
</head>
<body>

<!-- 비밀번호 잠금 -->
<div class="lock-screen" id="lock-screen">
  <div class="lock-box">
    <h2>오름 국어 진단 대시보드</h2>
    <p>강사용 페이지입니다. 비밀번호를 입력해 주세요.</p>
    <input type="password" id="lock-pw" placeholder="비밀번호" autofocus />
    <button id="lock-unlock">접속</button>
    <div class="err" id="lock-err"></div>
  </div>
</div>

<div class="container">
  <div class="dash-header">
    <div>
      <div class="dash-brand">[<span class="accent">오름</span>] 국어 진단 대시보드</div>
      <div class="dash-sub">2026학년도 5월 학력평가 · 학생별 응답 모니터링</div>
    </div>
    <div class="dash-controls">
      <button class="refresh-btn" id="refresh">↻ 새로고침</button>
    </div>
  </div>

  <!-- 통계 -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="label">총 제출 수</div>
      <div class="value" id="s-total">—</div>
      <div class="sub">전체 학생</div>
    </div>
    <div class="stat-card">
      <div class="label">평균 원점수</div>
      <div class="value" id="s-avg">—</div>
      <div class="sub">전체 평균</div>
    </div>
    <div class="stat-card">
      <div class="label">1~2등급</div>
      <div class="value" id="s-top">—</div>
      <div class="sub">상위권 비율</div>
    </div>
    <div class="stat-card">
      <div class="label">최다 약점 패턴</div>
      <div class="value" id="s-pattern" style="font-size: 16px; font-style:normal; font-family:'Noto Serif KR',serif;">—</div>
      <div class="sub" id="s-pattern-cnt">—</div>
    </div>
  </div>

  <!-- 필터 -->
  <div class="filter-row">
    <input type="text" id="search" placeholder="이름 검색…" />
    <label>선택과목</label>
    <select id="filter-choice">
      <option value="">전체</option>
      <option value="lm">언어와 매체</option>
      <option value="hs">화법과 작문</option>
    </select>
    <label>등급</label>
    <select id="filter-grade">
      <option value="">전체</option>
      <option value="1">1등급</option>
      <option value="2">2등급</option>
      <option value="3">3등급</option>
      <option value="4">4등급</option>
      <option value="5">5등급 이하</option>
    </select>
  </div>

  <!-- 학생 목록 -->
  <div id="content-area">
    <div class="loading-state">
      <div class="ico">⏳</div>
      <div class="msg">데이터를 불러오는 중입니다…</div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>
  <!-- 설정 파일 (한 번만 만들어 두고 이후 수정 불필요) -->
  <!-- 캐시 무력화를 위해 동적 로드 + URL에 타임스탬프 -->
  <script>
    (function() {
      var s = document.createElement('script');
      s.src = '../config.js?v=' + Date.now();
      s.async = false;
      document.write(s.outerHTML);
    })();
  </script>


<script>
/* ──────────────────────────────────────────
   설정
   ────────────────────────────────────────── */
// SCRIPT_URL과 DASH_PASSWORD는 config.js에서 가져옵니다 (편집 불필요)
const SCRIPT_URL = (window.OREUM_CONFIG && window.OREUM_CONFIG.SCRIPT_URL) || "";
const DASH_PASSWORD = (window.OREUM_CONFIG && window.OREUM_CONFIG.DASH_PASSWORD) || "";

const GRADE_LABEL = { lm: "언매", hs: "화작" };

const TIME_CODE_LABEL = {
  T1: "전체 시간 부족형",
  T2: "선택과목 지연형",
  T3: "문학 지연형",
  T4: "독서 지연형",
  T5: "고난도 집착형",
  T6: "검토 부재형",
  T7: "마킹 불안형",
  T8: "루틴 부재형"
};

function renderTimeDiag(r) {
  const codes = (r.timeCodes || "").split(",").map(c => c.trim()).filter(Boolean);
  const open1 = r.timeOpen1 || "";
  const open2 = r.timeOpen2 || "";

  if (codes.length === 0 && !open1 && !open2) {
    return `<div style="color: var(--text-muted); font-size: 13px;">응답 없음</div>`;
  }

  let html = "";
  if (codes.length > 0) {
    html += `<div style="display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px;">`;
    codes.forEach(c => {
      const label = TIME_CODE_LABEL[c] || c;
      html += `<span style="background:rgba(217,119,87,0.1); border:1px solid rgba(217,119,87,0.4); color:var(--wrong); padding:3px 9px; border-radius:3px; font-size: 12px; font-weight:500;">${c}. ${label}</span>`;
    });
    html += `</div>`;
  } else {
    html += `<div style="color: var(--green-accent); font-size: 13px; margin-bottom:10px;">✓ 시간 관리 위험 신호 없음</div>`;
  }

  if (open1) {
    html += `<div style="margin-top:10px; padding-top:10px; border-top:1px dashed var(--border-inner);">`;
    html += `<div style="color:var(--text-muted); font-size: 12px; margin-bottom:4px;">시간 빼앗긴 문항/지문</div>`;
    html += `<div style="color:var(--text-secondary); font-size: 13px; line-height:1.6; white-space:pre-wrap;">${escapeHtml(open1)}</div>`;
    html += `</div>`;
  }
  if (open2) {
    html += `<div style="margin-top:10px;">`;
    html += `<div style="color:var(--text-muted); font-size: 12px; margin-bottom:4px;">바꾸고 싶은 행동</div>`;
    html += `<div style="color:var(--text-secondary); font-size: 13px; line-height:1.6; white-space:pre-wrap;">${escapeHtml(open2)}</div>`;
    html += `</div>`;
  }
  return html;
}

/* ──────────────────────────────────────────
   비밀번호
   ────────────────────────────────────────── */
const STORED = sessionStorage.getItem("oreum-dash-auth");
if (STORED === DASH_PASSWORD) {
  document.getElementById("lock-screen").style.display = "none";
  loadData();
}

document.getElementById("lock-unlock").addEventListener("click", tryUnlock);
document.getElementById("lock-pw").addEventListener("keydown", e => {
  if (e.key === "Enter") tryUnlock();
});

function tryUnlock() {
  const v = document.getElementById("lock-pw").value;
  if (v === DASH_PASSWORD) {
    sessionStorage.setItem("oreum-dash-auth", v);
    document.getElementById("lock-screen").style.display = "none";
    loadData();
  } else {
    document.getElementById("lock-err").textContent = "비밀번호가 올바르지 않습니다.";
  }
}

/* ──────────────────────────────────────────
   데이터 로드
   ────────────────────────────────────────── */
let ALL_DATA = [];

async function loadData() {
  const btn = document.getElementById("refresh");
  btn.classList.add("loading");
  btn.textContent = "↻ 불러오는 중…";

  if (!SCRIPT_URL || SCRIPT_URL.includes("PASTE_YOUR")) {
    showError("Apps Script URL이 설정되지 않았습니다. config.js 파일의 SCRIPT_URL을 확인해 주세요.");
    btn.classList.remove("loading");
    btn.textContent = "↻ 새로고침";
    return;
  }

  try {
    const res = await fetch(SCRIPT_URL + "?mode=data&_=" + Date.now());
    const data = await res.json();
    if (!data.ok) {
      showError("데이터 로드 실패: " + (data.error || "알 수 없는 오류"));
      return;
    }
    ALL_DATA = (data.rows || []).reverse(); // 최신 먼저
    renderStats();
    renderTable();
  } catch (e) {
    showError("네트워크 오류: " + e.message);
  } finally {
    btn.classList.remove("loading");
    btn.textContent = "↻ 새로고침";
  }
}

function showError(msg) {
  document.getElementById("content-area").innerHTML = `
    <div class="error-state">
      <div class="ico">⚠</div>
      <div class="msg">${msg}</div>
    </div>`;
}

/* ──────────────────────────────────────────
   통계 렌더
   ────────────────────────────────────────── */
function renderStats() {
  const n = ALL_DATA.length;
  document.getElementById("s-total").textContent = n;
  if (n === 0) {
    ["s-avg", "s-top", "s-pattern"].forEach(id => document.getElementById(id).textContent = "—");
    return;
  }

  const raws = ALL_DATA.map(r => parseInt(r.raw, 10)).filter(v => !isNaN(v));
  const avg = raws.length ? Math.round(raws.reduce((a,b) => a+b, 0) / raws.length) : 0;
  document.getElementById("s-avg").textContent = avg;

  const grades = ALL_DATA.map(r => parseInt(r.grade, 10));
  const top = grades.filter(g => g === 1 || g === 2).length;
  document.getElementById("s-top").textContent = `${Math.round(top/n*100)}%`;

  // 가장 빈번한 약점 패턴
  const pCount = {};
  ALL_DATA.forEach(r => {
    if (r.topPattern) pCount[r.topPattern] = (pCount[r.topPattern] || 0) + 1;
  });
  const sorted = Object.entries(pCount).sort((a,b) => b[1]-a[1]);
  if (sorted.length > 0) {
    document.getElementById("s-pattern").textContent = sorted[0][0];
    document.getElementById("s-pattern-cnt").textContent = `${sorted[0][1]}명 / ${n}명`;
  }
}

/* ──────────────────────────────────────────
   테이블 렌더
   ────────────────────────────────────────── */
function renderTable() {
  const search = document.getElementById("search").value.trim().toLowerCase();
  const fc = document.getElementById("filter-choice").value;
  const fg = document.getElementById("filter-grade").value;

  const filtered = ALL_DATA.filter(r => {
    if (search && !r.name.toLowerCase().includes(search)) return false;
    if (fc && r.choice !== fc) return false;
    if (fg) {
      const g = parseInt(r.grade, 10);
      if (fg === "5") { if (g < 5) return false; }
      else { if (g != fg) return false; }
    }
    return true;
  });

  if (filtered.length === 0) {
    document.getElementById("content-area").innerHTML = `
      <div class="empty-state">
        <div class="ico">📭</div>
        <div class="msg">${ALL_DATA.length === 0 ? "아직 제출된 결과가 없습니다." : "조건에 맞는 학생이 없습니다."}</div>
      </div>`;
    return;
  }

  let html = `
    <table class="submissions-table">
      <thead>
        <tr>
          <th style="width:24px;"></th>
          <th>이름</th>
          <th style="width:80px;">선택</th>
          <th style="width:70px;">원점수</th>
          <th style="width:60px;">등급</th>
          <th style="width:70px;">백분위</th>
          <th style="width:60px;">오답</th>
          <th>약점 패턴</th>
          <th style="width:140px;">제출일</th>
        </tr>
      </thead>
      <tbody>`;

  filtered.forEach((r, i) => {
    const grade = parseInt(r.grade, 10);
    const date = r.timestamp ? formatTimestamp(r.timestamp) : "—";
    html += `
      <tr data-i="${i}">
        <td style="text-align:center; color:var(--text-dim);">▸</td>
        <td class="col-name">${escapeHtml(r.name)}</td>
        <td class="col-choice">${GRADE_LABEL[r.choice] || r.choice}</td>
        <td class="col-score">${r.raw || "—"}</td>
        <td class="col-grade g${grade}">${grade || "—"}</td>
        <td class="col-score">${r.pct || "—"}</td>
        <td class="col-wrong">${r.wrongCount || 0}</td>
        <td class="col-pattern">${escapeHtml(r.topPattern || "—")}</td>
        <td class="col-date">${date}</td>
      </tr>
      <tr class="detail-row">
        <td colspan="9">${renderDetail(r)}</td>
      </tr>`;
  });
  html += "</tbody></table>";
  document.getElementById("content-area").innerHTML = html;

  // 행 클릭 → 상세 토글
  document.querySelectorAll(".submissions-table tbody tr[data-i]").forEach(tr => {
    tr.addEventListener("click", () => {
      tr.classList.toggle("expanded");
      // 화살표 회전
      const arrow = tr.querySelector("td:first-child");
      if (arrow) arrow.textContent = tr.classList.contains("expanded") ? "▾" : "▸";
    });
  });

  // 복사 버튼
  document.querySelectorAll(".copy-btn").forEach(btn => {
    btn.addEventListener("click", e => {
      e.stopPropagation();
      const txt = btn.dataset.text;
      navigator.clipboard.writeText(txt).then(() => {
        btn.classList.add("copied");
        btn.textContent = "✓ 복사 완료";
        setTimeout(() => {
          btn.classList.remove("copied");
          btn.textContent = "📋 복사";
        }, 1800);
      });
    });
  });
}

function renderDetail(r) {
  let wrongs = [];
  try { wrongs = JSON.parse(r.wrongDetail || "[]"); } catch(e) {}

  const wrongTags = wrongs.map(q => {
    let cls = "wrong-num";
    if (q.three) cls += " three-pt";
    if (q.wr && q.wr >= 50) cls += " high-wr";
    if (q.wr && q.wr < 30) cls += " low-wr";
    const wrText = q.wr ? ` (${q.wr}%)` : "";
    return `<span class="${cls}" title="${q.area} · ${q.type}${wrText}">${q.no}</span>`;
  }).join("");

  const parentText = r.parentComment || "(학부모 코멘트가 없습니다)";

  return `
    <div class="detail-content">
      <div class="detail-left">
        <div class="detail-block">
          <h4>응시 정보</h4>
          <div class="row"><span class="key">이름</span><span class="val">${escapeHtml(r.name)}</span></div>
          <div class="row"><span class="key">선택과목</span><span class="val">${r.choiceName || GRADE_LABEL[r.choice]}</span></div>
          <div class="row"><span class="key">응시일</span><span class="val">${r.date || "—"}</span></div>
          <div class="row"><span class="key">제출 시각</span><span class="val">${formatTimestamp(r.timestamp)}</span></div>
        </div>
        <div class="detail-block">
          <h4>성적</h4>
          <div class="row"><span class="key">원점수</span><span class="val">${r.raw}</span></div>
          <div class="row"><span class="key">등급</span><span class="val">${r.grade}등급</span></div>
          <div class="row"><span class="key">표준점수</span><span class="val">${r.std}</span></div>
          <div class="row"><span class="key">백분위</span><span class="val">${r.pct}</span></div>
        </div>
        <div class="detail-block">
          <h4>오답 (총 ${r.wrongCount || 0}개)</h4>
          <div class="wrong-numbers">${wrongTags || "<span style='color:var(--text-muted); font-size: 13px;'>오답 없음</span>"}</div>
        </div>
        <div class="detail-block">
          <h4>최우선 약점</h4>
          <div style="color: var(--green-accent); font-weight: 500; margin-bottom: 6px;">${escapeHtml(r.topPattern || "—")}</div>
          <div style="color: var(--text-secondary); font-size: 13px; line-height: 1.6;">${escapeHtml(r.topPatternDetail || "")}</div>
        </div>
        <div class="detail-block">
          <h4>시간 관리 진단</h4>
          ${renderTimeDiag(r)}
        </div>
      </div>
      <div class="detail-right">
        <div>
          <h4 style="font-family:'Noto Sans KR',sans-serif; font-size: 16px; color:var(--gold); margin-bottom:10px; font-weight:700; letter-spacing:0.3px;">학부모 상담 코멘트</h4>
          <div class="parent-comment-box">
            <button class="copy-btn" data-text="${escapeHtml(parentText)}">📋 복사</button>
            ${escapeHtml(parentText)}
          </div>
        </div>
        <div>
          <h4 style="font-family:'Noto Sans KR',sans-serif; font-size: 16px; color:var(--text-secondary); margin-bottom:10px; font-weight:700; letter-spacing:0.3px;">학생용 코멘트 (참고)</h4>
          <div style="background: var(--bg-card-2); padding: 14px 16px; border-radius: 4px; color: var(--text-secondary); font-size: 13px; line-height: 1.7; white-space: pre-wrap; border: 1px solid var(--border-inner);">${escapeHtml(r.studentComment || "")}</div>
        </div>
      </div>
    </div>`;
}

function escapeHtml(s) {
  if (s == null) return "";
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function formatTimestamp(ts) {
  if (!ts) return "—";
  try {
    const d = new Date(ts);
    if (isNaN(d.getTime())) return ts;
    const m = (d.getMonth()+1).toString().padStart(2,"0");
    const day = d.getDate().toString().padStart(2,"0");
    const h = d.getHours().toString().padStart(2,"0");
    const mi = d.getMinutes().toString().padStart(2,"0");
    return `${d.getFullYear()}.${m}.${day} ${h}:${mi}`;
  } catch (e) { return ts; }
}

/* ──────────────────────────────────────────
   이벤트
   ────────────────────────────────────────── */
document.getElementById("refresh").addEventListener("click", loadData);
document.getElementById("search").addEventListener("input", renderTable);
document.getElementById("filter-choice").addEventListener("change", renderTable);
document.getElementById("filter-grade").addEventListener("change", renderTable);
</script>
</body>
</html>
