<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오름 모의고사 진단 — 강사 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --green-deep:#2f6b4e;--gold:#4aa97e;--gold-soft:#6fc99e;--cream:#eaf2ec;
  --bg-dark:#0b110d;--bg-card:#141c16;--bg-card-hover:#1b251d;
  --text-primary:#eaf2ec;--text-secondary:#aebcb0;--text-muted:#7c8a7f;
  --border-soft:rgba(74,169,126,0.22);--border-line:rgba(234,242,236,0.08);
  --danger:#d98a8a;
}
*{box-sizing:border-box;word-break:keep-all;overflow-wrap:break-word;margin:0;padding:0}
html{font-size:16px}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg-dark);color:var(--text-primary);min-height:100vh;line-height:1.7}
.wrap{max-width:1200px;margin:0 auto;padding:48px 24px}
h1{font-family:'Noto Serif KR',serif;font-weight:700;font-size:1.85rem;color:var(--cream);margin-bottom:6px}
.sub{color:var(--text-muted);font-size:0.88rem;margin-bottom:36px;letter-spacing:1px}
.section{background:var(--bg-card);border:1px solid var(--border-line);border-radius:6px;padding:32px;margin-bottom:24px}
.section-title{font-family:'Noto Serif KR',serif;color:var(--gold);font-size:0.92rem;letter-spacing:2.5px;margin-bottom:24px;padding-bottom:14px;border-bottom:1px solid var(--border-soft)}
input,select,button{font-family:inherit;font-size:0.92rem}
input,select{background:var(--bg-dark);border:1px solid var(--border-line);border-radius:4px;padding:11px 14px;color:var(--cream);transition:border-color 0.15s}
input:focus,select:focus{outline:none;border-color:var(--gold)}
button{background:var(--gold);color:var(--bg-dark);border:none;padding:11px 24px;border-radius:4px;cursor:pointer;font-weight:500;letter-spacing:0.5px}
button:hover{background:var(--gold-soft)}
button.ghost{background:transparent;color:var(--text-primary);border:1px solid var(--border-soft)}
button.ghost:hover{background:var(--bg-card-hover);border-color:var(--gold);color:var(--gold)}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.error{color:var(--danger);padding:14px 18px;background:rgba(198,102,102,0.1);border-radius:4px;margin:14px 0;font-size:0.88rem;border:1px solid rgba(198,102,102,0.3)}
.ok{color:var(--cream);padding:14px 18px;background:rgba(74,90,58,0.2);border-radius:4px;margin:14px 0;font-size:0.88rem;border:1px solid var(--green-deep)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--bg-dark);border:1px solid var(--border-line);border-radius:5px;padding:18px;text-align:center}
.stat-label{font-size:0.74rem;color:var(--text-muted);letter-spacing:1.5px;margin-bottom:8px}
.stat-num{font-family:'Noto Serif KR',serif;color:var(--gold);font-weight:700;font-size:1.8rem;line-height:1}
table{width:100%;border-collapse:collapse;font-size:0.88rem}
th{font-family:'Noto Serif KR',serif;color:var(--gold);text-align:left;padding:14px 12px;font-size:0.78rem;letter-spacing:1.5px;font-weight:500;border-bottom:1px solid var(--border-soft)}
td{padding:13px 12px;color:var(--text-secondary);border-bottom:1px solid var(--border-line);font-size:0.88rem}
tr:hover td{background:var(--bg-card-hover);color:var(--cream)}
.tag{display:inline-block;padding:2px 8px;border-radius:9px;font-size:0.72rem;letter-spacing:0.5px}
.tag-lm{background:rgba(74,90,58,0.4);color:var(--cream);border:1px solid var(--green-deep)}
.tag-hs{background:rgba(74,169,126,0.12);color:var(--gold-soft);border:1px solid rgba(74,169,126,0.3)}
.tag-grade{background:rgba(74,169,126,0.15);color:var(--gold);border:1px solid var(--gold);font-weight:500}
.empty{text-align:center;color:var(--text-muted);padding:48px 0;font-style:italic;font-size:0.92rem}
.hide{display:none}
.gd-hint{font-size:0.8rem;color:var(--text-muted);margin-bottom:10px}
.gd-round{border:1px solid var(--border-soft);border-radius:8px;margin-bottom:8px;overflow:hidden}
.gd-head{display:flex;align-items:center;gap:12px;padding:11px 14px;cursor:pointer;background:var(--bg-card-hover)}
.gd-head:hover{background:rgba(74,169,126,0.12)}
.gd-name{font-weight:600;color:var(--cream);font-size:0.92rem}
.gd-meta{color:var(--text-secondary);font-size:0.82rem}
.gd-caret{margin-left:auto;color:var(--gold-soft);font-size:0.78rem}
.gd-detail{padding:12px 14px}
.gd-detail.hide{display:none}
.gd-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(70px,1fr));gap:8px}
.gd-cell{text-align:center;padding:8px 4px;border:1px solid var(--border-soft);border-radius:6px;background:var(--bg-dark)}
.gd-cell.gd-zero{opacity:0.38}
.gd-g{font-size:0.72rem;color:var(--text-muted)}
.gd-n{font-size:1.05rem;font-weight:700;color:var(--gold);margin:2px 0}
.gd-p{font-size:0.75rem;color:var(--gold-soft)}
.gd-cum{font-size:0.66rem;color:var(--text-muted);margin-top:2px}
.gd-names{margin-top:11px;padding-top:9px;border-top:1px solid var(--border-line);font-size:0.84rem;color:var(--text-secondary);line-height:1.6}
.gd-names-t{color:var(--gold);font-weight:600;margin-right:8px}
.gd-und .gd-n{color:var(--text-secondary)}
.dedup-banner{background:rgba(217,138,138,0.09);border:1px solid rgba(217,138,138,0.45);border-radius:8px;padding:13px 16px;margin:0 0 18px;color:var(--cream)}
.dedup-head{font-size:0.9rem;font-weight:600;line-height:1.6}
.dedup-sub{font-size:0.78rem;color:var(--text-muted);font-weight:400}
.dedup-toggle{margin-left:8px;background:transparent;border:1px solid var(--border-soft);color:var(--text-secondary);font-size:0.72rem;padding:3px 10px;border-radius:12px;cursor:pointer;font-family:inherit}
.dedup-toggle:hover{border-color:var(--gold);color:var(--gold)}
.dedup-list{margin:11px 0 0;padding-left:18px;font-size:0.78rem;color:var(--text-secondary);line-height:1.75;max-height:240px;overflow:auto}
@media (max-width:640px){
  .wrap{padding:32px 16px}
  .row{flex-direction:column;align-items:stretch}
  .row input,.row select,.row button{width:100%}
  table{font-size:0.78rem}
  th,td{padding:10px 6px}
}

/* ── 탭 ── */
.tabs{display:flex;gap:4px;margin-bottom:24px;border-bottom:1px solid var(--border-soft)}
.tab{background:transparent;color:var(--text-muted);border:none;border-bottom:2px solid transparent;padding:12px 22px;font-size:0.9rem;font-weight:500;letter-spacing:0.5px;cursor:pointer;border-radius:0;font-family:'Noto Serif KR',serif}
.tab:hover{color:var(--text-secondary);background:transparent}
.tab.on{color:var(--gold);border-bottom-color:var(--gold)}

/* ── 개별 리포트 ── */
.round-picker{margin:2px 0 18px;padding:14px 16px;background:var(--bg-card);border:1px solid var(--border-line);border-radius:8px}
.rp-label{font-size:0.82rem;color:var(--cream);margin-bottom:10px;font-weight:500}
.rp-hint{font-size:0.72rem;color:var(--text-muted);font-weight:400}
.rp-chips{display:flex;flex-wrap:wrap;gap:8px}
.rp-chip{display:inline-flex;align-items:center;gap:7px;padding:7px 13px;border-radius:16px;border:1px solid var(--border-line);background:transparent;color:var(--text-secondary);font-family:inherit;font-size:0.82rem;cursor:pointer;transition:border-color .15s,background .15s}
.rp-chip:hover{border-color:var(--gold)}
.rp-chip.on{background:rgba(74,169,126,0.14);border-color:var(--gold);color:var(--cream)}
.rp-ord{font-weight:700;color:var(--gold);font-size:0.74rem;letter-spacing:0.3px}
.rp-cnt{font-size:0.68rem;color:var(--text-muted)}
#reportPane .rep-toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:22px}
.rfbtn{background:var(--bg-card);border:1px solid var(--border-line);color:var(--text-secondary);font-size:0.82rem;padding:7px 15px;border-radius:18px;cursor:pointer;letter-spacing:0.3px}
.rfbtn:hover{border-color:var(--gold);color:var(--cream);background:var(--bg-card)}
.rfbtn.on{background:var(--gold);color:var(--bg-dark);border-color:var(--gold);font-weight:500}
.rfbtn.pdf{border-color:var(--gold);color:var(--gold)}
.rfbtn.pdf:hover{background:var(--gold);color:var(--bg-dark)}
.rfbtn.pdf:disabled{opacity:.5;cursor:default}
.rep-search{margin-left:auto;background:var(--bg-dark);border:1px solid var(--border-line);color:var(--cream);font-size:0.85rem;padding:8px 14px;border-radius:18px;outline:none;width:170px}
.rep-search:focus{border-color:var(--gold)}

.repcard{background:var(--bg-card);border:1px solid var(--border-line);border-radius:8px;padding:30px 32px;margin-bottom:22px;position:relative;overflow:hidden}
.repcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold);opacity:.7}
.rc-head{display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:16px;border-bottom:1px solid var(--border-soft);margin-bottom:20px}
.rc-name{font-family:'Noto Serif KR',serif;font-size:1.5rem;font-weight:700;color:var(--cream)}
.rc-meta{color:var(--text-muted);font-size:0.82rem;margin-top:4px}
.rc-right{display:flex;flex-direction:column;align-items:flex-end;gap:7px}
.rc-tw{color:var(--text-muted);font-size:0.74rem}
.rtrend{font-size:0.74rem;font-weight:500;padding:3px 11px;border-radius:18px;letter-spacing:0.5px}
.rtrend-up{background:rgba(74,90,58,0.4);color:#a8d088;border:1px solid var(--green-deep)}
.rtrend-down{background:rgba(198,102,102,0.15);color:#d68a8a;border:1px solid rgba(198,102,102,0.4)}
.rtrend-keep{background:rgba(74,169,126,0.12);color:var(--gold-soft);border:1px solid rgba(74,169,126,0.3)}
.rtrend-single{background:rgba(122,116,102,0.18);color:var(--text-muted);border:1px solid var(--border-soft)}
.rpdf-btn{background:transparent;border:1px solid var(--gold);color:var(--gold);font-size:0.72rem;padding:5px 12px;border-radius:6px;cursor:pointer;font-weight:500}
.rpdf-btn:hover{background:var(--gold);color:var(--bg-dark)}

.rc-row1{display:grid;grid-template-columns:300px 1fr;gap:28px;margin-bottom:22px;align-items:center}
.rspark{width:300px;height:72px}.rspk-v{fill:var(--text-secondary);font-size:10px;font-weight:600}.rspk-x{fill:var(--text-muted);font-size:10px}
.rblk-t{font-size:0.78rem;color:var(--text-muted);font-weight:500;letter-spacing:1.5px;margin-bottom:12px}
.rblk-t.gold{color:var(--gold)}
.rblk-sub{color:var(--text-muted);font-weight:400;font-size:0.72rem;letter-spacing:0}
.rdonut-wrap{display:flex;align-items:center;gap:20px}
.rdonut{width:116px;height:116px;flex-shrink:0}
.rdonut-num{fill:var(--cream);font-size:21px;font-weight:700;font-family:'Noto Serif KR',serif}
.rdonut-lab{fill:var(--text-muted);font-size:10px}
.rlegend{display:flex;flex-direction:column;gap:8px;flex:1}
.rlg{display:flex;align-items:center;gap:9px;font-size:0.85rem}
.rlg-dot{width:11px;height:11px;border-radius:3px;flex-shrink:0}
.rlg-name{color:var(--text-secondary);flex:1}.rlg-val{color:var(--cream);font-weight:600}
.rdonut-empty{color:var(--text-muted);font-size:0.85rem;font-style:italic}
.rc-blk{margin-bottom:18px}
.rtbl2{width:100%;border-collapse:collapse;font-size:0.85rem}
.rtbl2 th{text-align:left;color:var(--text-muted);font-weight:500;font-size:0.74rem;letter-spacing:1px;padding:8px 11px;background:var(--bg-dark);border-bottom:1px solid var(--border-soft)}
.rtbl2 td{padding:9px 11px;border-bottom:1px solid var(--border-line);vertical-align:top}
.rtbl2 tr:hover td{background:transparent}
.r-rnd{width:96px;font-weight:600;color:var(--text-secondary);vertical-align:top}
.r-rnd-exam{display:block;font-size:0.66rem;color:var(--text-muted);font-weight:400;margin-top:3px;line-height:1.25;white-space:nowrap}
.r-sc{width:96px;font-weight:600;white-space:nowrap}
.r-gong{color:var(--text-secondary);font-size:0.8rem;line-height:1.7}
.r-sun{width:150px;color:var(--gold-soft);font-size:0.8rem;line-height:1.7}
.r-empty td{color:var(--text-muted);font-style:italic}
.rweak{background:var(--bg-dark);border:1px solid var(--border-line);border-left:3px solid var(--gold);border-radius:8px;padding:17px 20px}
.rdiag{background:var(--bg-dark);border:1px solid var(--border-line);border-radius:8px;padding:17px 20px}
.rdlist{list-style:none;display:flex;flex-direction:column;gap:8px}
.rdlist li{font-size:0.86rem;color:var(--text-secondary);padding-left:17px;position:relative;line-height:1.65}
.rdlist li::before{content:'';position:absolute;left:0;top:9px;width:6px;height:6px;border-radius:50%;background:var(--gold);opacity:.75}
.rdlist b{color:var(--cream);font-weight:600}
.rtime{background:var(--bg-dark);border:1px solid var(--border-line);border-left:3px solid var(--gold);border-radius:8px;padding:14px 18px}
.rtime .tc{font-size:0.86rem;color:var(--text-secondary);line-height:1.6}.rtime .tc b{color:var(--gold);font-weight:600}
.rc-foot{display:flex;justify-content:space-between;align-items:center;margin-top:4px;padding-top:13px;border-top:1px solid var(--border-line);font-size:0.72rem}
.rc-foot .m{color:var(--gold)}.rc-foot .n{color:var(--text-muted)}

.pdf-overlay{position:fixed;inset:0;background:rgba(15,18,11,.82);z-index:9999;display:none;align-items:center;justify-content:center}
.pdf-overlay-box{display:flex;flex-direction:column;align-items:center;gap:15px;background:var(--bg-card);border:1px solid var(--border-soft);border-radius:14px;padding:30px 42px}
.pdf-overlay-text{color:var(--cream);font-size:0.95rem;font-weight:500}
.pdf-spin{width:32px;height:32px;border:3px solid var(--border-soft);border-top-color:var(--gold);border-radius:50%;animation:pdfspin .8s linear infinite}
@keyframes pdfspin{to{transform:rotate(360deg)}}

@media print{
  body{background:#fff}
  .tabs,.rep-toolbar,.no-print,h1,.sub{display:none!important}
  .repcard{break-inside:avoid;page-break-after:always;border:1px solid #ccc;background:#fff}
}
@media (max-width:640px){
  .rc-row1{grid-template-columns:1fr}.rspark{width:100%}.rdonut-wrap{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>
<div class="wrap">

<h1>오름 모의고사 진단 — 강사 대시보드</h1>
<p class="sub">가경T · 오름 국어 연구소</p>

<!-- 비밀번호 게이트 -->
<div id="gate" class="section">
  <div class="section-title">관리자 인증</div>
  <p style="color:var(--text-secondary);font-size:0.9rem;margin-bottom:20px">대시보드에 접근하려면 관리자 비밀번호를 입력해 주세요.</p>
  <div class="row">
    <input id="pwInput" type="password" placeholder="비밀번호" style="flex:1;min-width:200px" onkeydown="if(event.key==='Enter')checkPassword()">
    <button onclick="checkPassword()">로그인</button>
  </div>
  <div id="gateMsg"></div>
</div>

<!-- 메인 -->
<div id="main" class="hide">

  <div id="dedupNotice"></div>

  <div class="tabs">
    <button class="tab on" id="tabList" onclick="switchTab('list')">응답 목록</button>
    <button class="tab" id="tabReport" onclick="switchTab('report')">학생별 개별 리포트</button>
  </div>

  <!-- 응답 목록 페인 -->
  <div id="listPane">
  <div class="section">
    <div class="section-title">조회 조건</div>
    <div class="row">
      <select id="examSelect" style="min-width:280px">
        <option value="all">전체 회차</option>
      </select>
      <input id="searchInput" type="text" placeholder="이름·학교 검색" style="flex:1;min-width:180px">
      <button onclick="loadData()">새로고침</button>
      <button class="ghost" onclick="logout()">로그아웃</button>
    </div>
    <div id="loadMsg"></div>
  </div>

  <div id="statsBox"></div>

  <div id="gradeDistBox"></div>

  <div class="section">
    <div class="section-title">응답 목록</div>
    <div id="tableBox"><div class="empty">데이터를 불러오는 중...</div></div>
  </div>
  </div>

  <!-- 학생별 개별 리포트 페인 -->
  <div id="reportPane" style="display:none">
    <div class="section">
      <div class="section-title">학생별 개별 리포트</div>
      <div id="roundPicker" class="round-picker"></div>
      <div class="rep-toolbar">
        <button class="rfbtn on" data-rf="all" onclick="repFilter('all',this)">전체</button>
        <button class="rfbtn" data-rf="4" onclick="repFilter('4',this)">전회차 응시</button>
        <button class="rfbtn" data-rf="multi" onclick="repFilter('multi',this)">다회차</button>
        <button class="rfbtn" data-rf="상승" onclick="repFilter('상승',this)">상승</button>
        <button class="rfbtn" data-rf="하락" onclick="repFilter('하락',this)">하락</button>
        <button class="rfbtn pdf" id="repAllPdf" onclick="printAllReports()">전체 PDF 저장</button>
        <input class="rep-search" id="repSearch" placeholder="이름 검색" oninput="repSearchFn(this.value)">
      </div>
      <div id="repNote" style="color:var(--text-muted);font-size:0.8rem;margin-bottom:18px"></div>
      <div id="reportRoot"><div class="empty">데이터를 불러오는 중...</div></div>
    </div>
  </div>

</div>
</div>

<div class="pdf-overlay no-print" id="pdfOverlay">
  <div class="pdf-overlay-box"><div class="pdf-spin"></div><div class="pdf-overlay-text"></div></div>
</div>

<script>
// config.js 로드
let SCRIPT_URL = null, DASH_PASSWORD = null;
function loadConfig(){
  return new Promise(resolve=>{
    const s = document.createElement('script');
    s.src = 'config.js?v='+Date.now();
    s.onload = ()=>{
      if(window.OREUM_CONFIG){
        SCRIPT_URL = window.OREUM_CONFIG.SCRIPT_URL || null;
        DASH_PASSWORD = window.OREUM_CONFIG.DASH_PASSWORD || null;
      }
      resolve();
    };
    s.onerror = ()=>resolve();
    document.head.appendChild(s);
  });
}

let ALL_DATA = [];

// ─── 중복 응답 정리 (비파괴: 시트 원본 유지, 통계/표/리포트에서만 제외) ───
//  같은 시험·같은 학생이 2건↑일 때
//   · 완전 동일(제출시각만 다름)  → 중복 클릭 → 1건만 남김
//   · 값이 다름(점수 등)          → 재입력 정정 → 최신 1건만 남기고 이전 제거
var DEDUP_INFO = { dup:0, reentry:0, removed:[] };
function rowSig(r){
  var o={};
  Object.keys(r).forEach(function(k){ if(k!=='제출시각'&&k!=='timestamp'&&k!=='_kstTime') o[k]=String(r[k]==null?'':r[k]); });
  return JSON.stringify(o);
}
function rowTime(r){ var t=Date.parse(val(r,'timestamp','제출시각')); return isNaN(t)?0:t; }
function dedupeData(rows){
  var groups={}, order=[];
  (rows||[]).forEach(function(r){
    var name=val(r,'name','이름').trim();
    var exam=normExamId(val(r,'exam','회차ID'));
    var school=val(r,'school','학교').replace(/등학교$/,'고').trim();
    if(!name||!exam){ var k0='_keep'; (groups[k0]=groups[k0]||[]).push(r); if(order.indexOf(k0)<0)order.push(k0); return; }
    var key=exam+''+name+''+school;
    if(!groups[key]){ groups[key]=[]; order.push(key); }
    groups[key].push(r);
  });
  var kept=[], removed=[], dup=0, reentry=0;
  order.forEach(function(key){
    var g=groups[key];
    if(key==='_keep'){ g.forEach(function(r){kept.push(r);}); return; }
    if(g.length<=1){ kept.push(g[0]); return; }
    g.sort(function(a,b){return rowTime(a)-rowTime(b);});           // 시간순
    var sigs=g.map(rowSig), allSame=sigs.every(function(s){return s===sigs[0];});
    var keepRow, dropList, reason;
    if(allSame){ keepRow=g[0]; dropList=g.slice(1); reason='중복 제출(완전 동일)'; dup+=dropList.length; }
    else { keepRow=g[g.length-1]; dropList=g.slice(0,g.length-1); reason='재입력 정정(이전 데이터 제거)'; reentry+=dropList.length; }
    kept.push(keepRow);
    dropList.forEach(function(r){
      removed.push({
        name: val(r,'name','이름').trim(),
        exam: val(r,'examLabel','회차이름') || normExamId(val(r,'exam','회차ID')),
        reason: reason,
        raw: val(r,'raw','원점수'),
        time: repKST(val(r,'timestamp','제출시각'))
      });
    });
  });
  DEDUP_INFO={ dup:dup, reentry:reentry, removed:removed };
  return kept;
}
function renderDedupNotice(){
  var box=document.getElementById('dedupNotice'); if(!box) return;
  var info=DEDUP_INFO||{}, total=(info.dup||0)+(info.reentry||0);
  if(!total){ box.innerHTML=''; return; }

    +'<span class="dedup-sub"> — 중복 제출 '+(info.dup||0)+'건 · 재입력 정정 '+(info.reentry||0)+'건 (시트 원본은 그대로 유지)</span>'
    +' <button class="dedup-toggle" onclick="document.getElementById(\'dedupList\').classList.toggle(\'hide\')">상세 보기</button></div>'
    +'<ul id="dedupList" class="dedup-list hide">'+lines+'</ul></div>';
}

// ─── 등급컷 캐시 & 등급 재계산 (등급컷 입력 전 제출분의 '미정' 보정) ───
const GRADECUTS = {};   // examId -> {lm:[...], hs:[...]}
const QMAP = {};        // examId -> { 'common-13':{type,thinking,source,coreElement,remediation,wr,three,area}, ... }
// 구글 시트가 'YYYY-MM' 회차ID를 날짜로 강제 변환한 경우(예: 2027-06 → 2027-05-31T15:00:00.000Z) 원래 id로 복원
function normExamId(raw){
  raw = (raw==null ? '' : String(raw)).trim();
  if(/^\d{4}-\d{2}-\d{2}T/.test(raw)){
    const dt = new Date(raw);
    if(!isNaN(dt)){
      const k = new Date(dt.getTime() + 9*3600*1000); // KST(UTC+9)
      return k.getUTCFullYear() + '-' + String(k.getUTCMonth()+1).padStart(2,'0');
    }
  }
  return raw;
}
function loadGradeCuts(ids){
  return Promise.all((ids||[]).map(id=>
    fetch('data/mock-'+id+'.json?v='+Date.now())
      .then(r=>r.json())
      .then(d=>{
        GRADECUTS[id] = (d && d.gradeCuts) ? d.gradeCuts : null;
        var m={};
        ['common','hs','lm'].forEach(function(sc){
          ((d.questions && d.questions[sc]) || []).forEach(function(q){ m[sc+'-'+q.no]=q; });
        });
        QMAP[id]=m;
      })
      .catch(()=>{ GRADECUTS[id] = null; QMAP[id] = {}; })
  ));
}
function computeGradeFromRaw(examId, choice, raw){
  const gc = GRADECUTS[examId];
  if(!gc) return null;
  const cuts = gc[choice];
  if(!cuts || !cuts.length) return null;
  const r = parseInt(raw, 10);
  if(isNaN(r)) return null;
  for(const c of cuts){ if(r >= c.raw) return {grade:c.grade, std:c.std, pct:c.pct}; }
  const last = cuts[cuts.length-1];
  return {grade:last.grade, std:last.std, pct:last.pct};
}
// 소급 재계산: 틀린문항 + QMAP(배점)로 raw 재계산 (배점 정정 소급, 시트 원본 불변)
function rawOf(r){
  var examId = normExamId(r.exam||r['회차ID']||r['시험']||'');
  var stored = parseInt((r.raw!=null?r.raw:r['원점수']),10);
  var storedV = isNaN(stored)?null:stored;
  var qm = QMAP[examId];
  if(!qm) return storedV;
  var ks = Object.keys(qm); if(!ks.length) return storedV;
  var wstr = val(r,'','틀린문항');
  var choice = (r.choice||r['선택과목']||'').toString().trim();
  if(choice!=='hs' && choice!=='lm'){
    if(/(^|,)\s*hs-/.test(wstr)) choice='hs'; else if(/(^|,)\s*lm-/.test(wstr)) choice='lm';
  }
  if(choice!=='hs' && choice!=='lm') return storedV;
  var total=0;
  ks.forEach(function(k){ if(k.indexOf('common-')===0 || k.indexOf(choice+'-')===0) total += (qm[k].three?3:2); });
  if(!total) return storedV;
  var wrongs = (wstr||'').split(',').map(function(x){return x.trim();}).filter(Boolean);
  var wsum=0, ok=true;
  wrongs.forEach(function(k){ var q=qm[k]; if(q) wsum += (q.three?3:2); else ok=false; });
  if(!ok) return storedV;
  return total - wsum;
}
function avgRaw(rows){
  var n=(rows||[]).map(rawOf).filter(function(v){return v!=null && !isNaN(v) && v>0;});
  return n.length ? n.reduce(function(a,b){return a+b;},0)/n.length : 0;
}
// 저장된 등급이 숫자면 그대로, '미정'·빈값이면 원점수로 재계산
function gradeOf(r){
  const examId = normExamId(r.exam||r['회차ID']||r['시험']||'');
  const choice = (r.choice||r['선택과목']||'').toString().trim();
  const c = computeGradeFromRaw(examId, choice, rawOf(r));
  if(c) return String(c.grade);
  const stored = (r['예상등급']!=null ? r['예상등급'] : r.grade);
  const s = (stored==null ? '' : String(stored)).trim();
  return (s && s!=='미정') ? s : '';
}

    .forEach(([id, name]) => {

      opt.value = id;
      // 라벨: "회차이름 (회차ID)" 형식. 회차이름이 길면 ID도 같이 보여서 강사가 구분 쉽게
      opt.textContent = name === id ? id : `${name}`;

    });

  if(currentValue && Array.from(select.options).some(o => o.value === currentValue)){
    select.value = currentValue;
  }
}

// 제출시각: UTC ISO(…Z/오프셋)면 KST(+9h)로 변환해 표시
function rep2(n){return String(n).padStart(2,'0');}
function repKST(s){
  s=(s==null?'':String(s)).trim(); if(!s) return '';
  var d=new Date(s);
  if(!isNaN(d) && /(\dZ|[+\-]\d\d:?\d\d)$/.test(s)){
    var k=new Date(d.getTime()+9*3600*1000);
    return k.getUTCFullYear()+'-'+rep2(k.getUTCMonth()+1)+'-'+rep2(k.getUTCDate())+' '+rep2(k.getUTCHours())+':'+rep2(k.getUTCMinutes());
  }
  return s.substring(0,16).replace('T',' ');
}

    if(ones.length){ html+='<div class="gd-names"><span class="gd-names-t">★ 1등급 '+ones.length+'명</span>'+ones.join(', ')+'</div>'; }

function avg(rows, key1, key2){
  const nums = rows.map(r=>parseFloat(r[key1]||r[key2]||0)).filter(n=>!isNaN(n)&&n>0);
  if(nums.length===0) return 0;
  return nums.reduce((a,b)=>a+b,0)/nums.length;
}
function examShort(exam, examName){
  // 회차이름이 있으면 그걸 짧게 변환
  if(examName){
    // "2026학년도 5월 전국연합학력평가" → "5월 학평"
    if(/5월.*학력평가|학평/.test(examName)) return '5월 학평';
    if(/6월.*평가|모의평가/.test(examName) && /6월/.test(examName)) return '6월 모평';
    if(/9월.*평가|모의평가/.test(examName) && /9월/.test(examName)) return '9월 모평';
    if(/수능/.test(examName)) return '수능';
    // "2027 이감 모의고사 시즌3 1회차" → "이감 시즌3-1"
    let m = examName.match(/이감.*시즌\s*(\d+)\s*[-·]?\s*(\d+)\s*회차/);
    if(m) return `이감 시즌${m[1]}-${m[2]}`;
    // "2027 상상 모의고사 시즌2 1회차" → "상상 시즌2-1"
    m = examName.match(/상상.*시즌\s*(\d+)\s*[-·]?\s*(\d+)\s*회차/);
    if(m) return `상상 시즌${m[1]}-${m[2]}`;
    // 그 외엔 회차이름의 마지막 식별 부분 사용 (너무 길면 잘라서)
    if(examName.length <= 20) return examName;
    return examName.slice(0, 18) + '…';
  }
  // 회차이름 없으면 ID로 추정
  if(!exam) return '-';
  if(/^2026-05/.test(exam)) return '5월 학평';
  if(/^2027-s2/.test(exam)) return '상상 시즌2';
  if(/^2027-s3/.test(exam)) return '이감 시즌3';
  if(/^2025-05/.test(exam)) return '5월 학평';
  return exam;
}
function escape(s){ return String(s||'').replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }

// ════════════════ 학생별 개별 리포트 ════════════════
var REP = { master: [], sel: [], labelMap: {}, avail: [] };
var EXCLUDE = {"실험용":1,"테스트":1,"클로드":1};
var ALIAS = {"지환":"신지환"};

// ── 리포트에 포함할 회차를 동적으로 선택 (기본: 가장 최근 4회) ──
// 칩/표에 쓸 회차명: 6월 모평 등 평가원·학평류는 학년도를 붙여 구분
function repRoundName(id, fullName){
  fullName=(fullName||'').trim();
  var base=examShort(id, fullName);
  var ym=fullName.match(/(20\d\d)\s*학년도/);
  if(ym && /(모평|학평|수능|모의평가|학력평가)/.test(base)) return ym[1]+'학년도 '+base;

function buildReports(){
  repInitSel();

  (ALL_DATA||[]).forEach(function(r){
    var name=val(r,'name','이름').trim();

    var rid=normExamId(val(r,'exam','회차ID'));
    if(REP.sel.indexOf(rid)<0)return;
    var raw=rawOf(r); if(raw==null||isNaN(raw))raw=parseInt(val(r,'raw','원점수'),10)||0;
    var grade=parseInt(gradeOf(r),10)||0;

    var time=val(r,'','시간진단').trim();

    var school=val(r,'school','학교').replace(/등학교$/,"고").trim();
    var sub=val(r,'choice','선택과목').trim();

          if(meta.remediation)typeAgg[ty].rem=meta.remediation;
          if(meta.coreElement)typeAgg[ty].core=meta.coreElement;

        }

    });

    if(ga!==gb)return ga-gb;return a.name.localeCompare(b.name,'ko');});

      bars+='<text x="'+(x+bw/2).toFixed(0)+'" y="'+(y-3).toFixed(0)+'" text-anchor="middle" class="rspk-v">'+v+'</text>';
    } else bars+='<rect x="'+x.toFixed(0)+'" y="'+(H-16)+'" width="'+bw+'" height="2" fill="#2a3a30"/>';
    bars+='<text x="'+(x+bw/2).toFixed(0)+'" y="'+(H-2)+'" text-anchor="middle" class="rspk-x">'+REP.labelMap[r]+'</text>';});
  var base=H-(80/100)*(H-22)-14;
  return '<svg viewBox="0 0 '+W+' '+H+'" class="rspark"><line x1="'+pad+'" y1="'+base.toFixed(1)+'" x2="'+(W-pad)+'" y2="'+base.toFixed(1)+'" stroke="#2f6b4e" stroke-dasharray="3 3"/>'+bars+'</svg>';}
function rRoundRows(m){var rows="";
  REP.sel.forEach(function(r,i){var pr=m.per_round[i];
    if(pr){var gong=pr.wrongs.filter(function(w){return w.indexOf("common")===0;}).sort(function(a,b){return parseInt(/\d+/.exec(a))-parseInt(/\d+/.exec(b));});
      var sun=pr.wrongs.filter(function(w){return w.indexOf("common")!==0;}).sort(function(a,b){return parseInt(/\d+/.exec(a))-parseInt(/\d+/.exec(b));});
      rows+='<tr><td class="r-rnd">'+REP.labelMap[r]+'<span class="r-rnd-exam">'+escape(REP.nameMap[r]||'')+'</span></td><td class="r-sc" style="color:'+rGcol(pr.grade)+'">'+pr.raw+'·'+pr.grade+'등급</td><td class="r-gong">'+(gong.length?gong.map(rItemnum).join(", "):"—")+'</td><td class="r-sun">'+(sun.length?sun.map(rItemnum).join(", "):"—")+'</td></tr>';
    } else rows+='<tr class="r-empty"><td class="r-rnd">'+REP.labelMap[r]+'<span class="r-rnd-exam">'+escape(REP.nameMap[r]||'')+'</span></td><td colspan="3">미응시</td></tr>';});
  return rows;}

function renderReports(){
  var root=document.getElementById('reportRoot');
  var note=document.getElementById('repNote');
  if(!REP.master.length){ root.innerHTML='<div class="empty">선택한 회차에 응시한 데이터가 없습니다. 위에서 회차를 바꿔 보세요.</div>'; note.textContent=''; return; }
  note.innerHTML='리포트 회차 <b style="color:var(--gold)">'+REP.sel.length+'개</b> · 응시 학생 <b style="color:var(--gold)">'+REP.master.length+'명</b> · 회차 구성은 위 칩에서 변경할 수 있습니다.';
  var html="";
  REP.master.forEach(function(m,i){
    var school=m.school||"—",sub=m.sub==="lm"?"언매":"화작";
    var tc=rTimeComment(m);
    var timeBlock=tc?'<div class="tc">'+tc+'</div>':'<div class="tc" style="color:var(--text-muted)">시간 진단 데이터 없음</div>';
    var diag=rDiagnose(m).map(function(d){return '<li>'+d+'</li>';}).join("");
    var integ=rIntegrated(m).map(function(d){return '<li>'+d+'</li>';}).join("");
    var sid="rep-"+i;
    html+='<div class="repcard" id="'+sid+'" data-n="'+m.n+'" data-trend="'+m.trend+'" data-name="'+m.name+'">'
      +'<div class="rc-head"><div><div class="rc-name">'+m.name+'</div><div class="rc-meta">'+school+' · '+sub+' · '+m.n+'/'+REP.sel.length+'회 응시</div></div>'
      +'<div class="rc-right"><span class="rtrend rtrend-'+rTcls(m.trend)+'">'+rTlabel(m.trend)+'</span><span class="rc-tw">누적 오답 '+m.total_wrong+'개</span>'
      +'<button class="rpdf-btn no-print" onclick="printOneReport(\''+sid+'\')">이 학생 PDF</button></div></div>'
      +'<div class="rc-row1"><div>'+rSpark(m)+'</div>'
      +'<div><div class="rblk-t">반복 약점 영역 비중</div>'+rDonut(m)+'</div></div>'
      +'<div class="rc-blk"><div class="rblk-t">회차별 오답 <span class="rblk-sub">(공통 = 독서·문학 1~34 / 선택 = 화작·언매 35~45)</span></div>'
      +'<table class="rtbl2"><thead><tr><th>회차</th><th>점수</th><th>공통(1~34)</th><th>선택(35~45)</th></tr></thead><tbody>'+rRoundRows(m)+'</tbody></table></div>'
      +'<div class="rc-blk rweak"><div class="rblk-t gold">진단 약점 <span class="rblk-sub">(1~'+REP.sel.length+'회 통합 분석)</span></div><ul class="rdlist">'+integ+'</ul></div>'
      +'<div class="rc-blk rtime"><div class="rblk-t gold">시간 관리</div>'+timeBlock+'</div>'
      +'<div class="rc-blk rdiag"><div class="rblk-t gold">진단 종합</div><ul class="rdlist">'+diag+'</ul></div>'
      +'<div class="rc-foot"><span class="m">가경T · 오름 국어 연구소</span><span class="n">'+(i+1)+' / '+REP.master.length+'</span></div></div>';
  });
  root.innerHTML=html;
  document.querySelectorAll('.rfbtn[data-rf]').forEach(function(b){b.classList.toggle('on',b.dataset.rf==='all');});
  var rs=document.getElementById('repSearch'); if(rs) rs.value='';
}
function repFilter(f,btn){
  document.querySelectorAll('.rfbtn[data-rf]').forEach(function(x){x.classList.remove('on');});
  if(btn)btn.classList.add('on');
  document.querySelectorAll('.repcard').forEach(function(p){var n=+p.dataset.n,t=p.dataset.trend;
    p.style.display=(f==='all'||(f==='4'&&n===REP.sel.length)||(f==='multi'&&n>=2)||(f===t))?'':'none';});
}
function repSearchFn(q){q=q.trim();
  document.querySelectorAll('.repcard').forEach(function(p){p.style.display=(!q||(p.dataset.name||'').indexOf(q)>=0)?'':'none';});}

// ── PDF (캡처 방식) ──
function getJsPDF(){if(window.jspdf&&window.jspdf.jsPDF)return window.jspdf.jsPDF;if(window.jsPDF)return window.jsPDF;return null;}
function repLibsReady(){return !!(window.html2canvas&&getJsPDF());}
async function repCapture(t){var btn=t.querySelector('.rpdf-btn');var pv=btn?btn.style.visibility:'';if(btn)btn.style.visibility='hidden';
  var c=await html2canvas(t,{scale:2,backgroundColor:'#141c16',useCORS:true,logging:false,windowWidth:t.scrollWidth});if(btn)btn.style.visibility=pv;return c;}
function repA4(pdf,c,first){var pw=210,ph=297;if(!first)pdf.addPage();pdf.setFillColor(26,31,21);pdf.rect(0,0,pw,ph,'F');
  var ratio=c.height/c.width,w=pw,h=w*ratio;if(h>ph){h=ph;w=h/ratio;}var x=(pw-w)/2,y=(ph-h)/2;
  pdf.addImage(c.toDataURL('image/jpeg',0.92),'JPEG',x,y,w,h);}
async function printOneReport(id){var t=document.getElementById(id);if(!t)return;
  if(!repLibsReady()){alert('PDF 기능을 불러오지 못했습니다. 새로고침 후 다시 시도하세요.');return;}
  var name=t.dataset.name||'학생';repOverlay(name+' PDF 생성 중…');
  try{if(document.fonts&&document.fonts.ready)await document.fonts.ready;}catch(e){}
  await new Promise(function(r){setTimeout(r,120);});
  try{var c=await repCapture(t);var jsPDF=getJsPDF();var ratio=c.height/c.width;
    var pdf=new jsPDF({orientation:(210*ratio)>=210?'portrait':'landscape',unit:'mm',format:[210,210*ratio]});
    pdf.setFillColor(26,31,21);pdf.rect(0,0,210,210*ratio,'F');pdf.addImage(c.toDataURL('image/jpeg',0.95),'JPEG',0,0,210,210*ratio);
    pdf.save('오름_'+name+'_진단리포트.pdf');
  }catch(err){alert('PDF 생성 오류: '+(err.message||err));}finally{repHideOverlay();}}
async function printAllReports(){
  if(!repLibsReady()){alert('PDF 기능을 불러오지 못했습니다. 새로고침 후 다시 시도하세요.');return;}
  var cards=[].slice.call(document.querySelectorAll('.repcard')).filter(function(p){return getComputedStyle(p).display!=='none';});
  if(!cards.length){alert('표시된 학생이 없습니다.');return;}
  var btn=document.getElementById('repAllPdf');if(btn)btn.disabled=true;
  repOverlay('전체 PDF 생성 준비 중… (0/'+cards.length+')');
  try{if(document.fonts&&document.fonts.ready)await document.fonts.ready;}catch(e){}
  await new Promise(function(r){setTimeout(r,150);});
  try{var jsPDF=getJsPDF();var pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    for(var i=0;i<cards.length;i++){var name=cards[i].dataset.name||('학생'+(i+1));
      repOverlay('전체 PDF 생성 중… ('+(i+1)+'/'+cards.length+') · '+name);
      await new Promise(function(r){setTimeout(r,20);});
      var c=await repCapture(cards[i]);repA4(pdf,c,i===0);c.width=0;c.height=0;}
    repOverlay('PDF 저장 중…');await new Promise(function(r){setTimeout(r,30);});
    pdf.save('오름_학생별_개별리포트_전체.pdf');
  }catch(err){alert('전체 PDF 오류: '+(err.message||err));}finally{if(btn)btn.disabled=false;repHideOverlay();}}
function repOverlay(t){var ov=document.getElementById('pdfOverlay');ov.querySelector('.pdf-overlay-text').textContent=t||'PDF 생성 중…';ov.style.display='flex';}
function repHideOverlay(){document.getElementById('pdfOverlay').style.display='none';}

loadConfig().then(()=>{
  if(sessionStorage.getItem('oreum_dash_auth')==='1' && DASH_PASSWORD){
    document.getElementById('gate').classList.add('hide');
    document.getElementById('main').classList.remove('hide');
    loadData();
  }
});
