<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>이감 시즌3 · 학생별 개별 리포트 (실시간)</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
 --bg:#0c1f18;--card:#12342a;--card2:#0f2b22;--line:#1f4a3b;--line2:#27604c;
 --t1:#eef5f0;--t2:#bcd4c8;--t3:#7fa494;--t4:#5a7d6e;
 --g-hi:#86d9b0;--g-mid:#d9c47e;--g-warn:#d6a96a;--g-lo:#d68a8a;
 --acc:#cda96a;--acc2:#e3c98a;
 --seg-dok:#d68a8a;--seg-mun:#86c9a8;--seg-sun:#cda96a;--donut-track:#0a1d16;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t1);font-family:'Pretendard',sans-serif;line-height:1.55;
 background-image:radial-gradient(circle at 15% -5%,#103326 0%,transparent 50%),radial-gradient(circle at 95% 0%,#0d2a20 0%,transparent 45%);background-attachment:fixed}
.top{max-width:880px;margin:0 auto;padding:52px 24px 8px}
.eyebrow{color:var(--acc2);font-size:12px;letter-spacing:.2em;font-weight:600;margin-bottom:11px}
.top h1{font-size:31px;font-weight:800;letter-spacing:-.02em;margin-bottom:11px}
.top h1 .dim{color:var(--t3)}
.top p{color:var(--t2);font-size:14px;max-width:640px}

/* 데이터 상태 바 */
.databar{max-width:880px;margin:18px auto 0;padding:14px 18px;background:var(--card);border:1px solid var(--line);border-radius:12px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.databar .status{font-size:13px;color:var(--t2);flex:1;min-width:180px}
.databar .status b{color:var(--acc2)}
.databar .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--t4);margin-right:7px;vertical-align:middle}
.databar .dot.live{background:var(--g-hi);box-shadow:0 0 8px var(--g-hi)}
.databar .dot.err{background:var(--g-lo)}
.rbtn{background:var(--acc);border:none;color:#0c1f18;font-size:13px;font-weight:700;padding:8px 16px;border-radius:8px;cursor:pointer;font-family:inherit}
.rbtn:disabled{opacity:.5;cursor:default}
.rbtn.ghost{background:transparent;border:1px solid var(--line2);color:var(--t2)}

.filters{max-width:880px;margin:18px auto 0;padding:0 24px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.fbtn{background:var(--card);border:1px solid var(--line);color:var(--t2);font-size:13px;padding:7px 15px;border-radius:20px;cursor:pointer;font-family:inherit;transition:.15s}
.fbtn:hover{border-color:var(--acc);color:var(--t1)}
.fbtn.on{background:var(--acc);color:#0c1f18;border-color:var(--acc);font-weight:700}
.fbtn-pdf{border-color:var(--acc);color:var(--acc2);font-weight:600}
.fbtn-pdf:hover{background:var(--acc);color:#0c1f18}
.fbtn-pdf:disabled{opacity:.5;cursor:default}
.search{margin-left:auto;background:var(--card);border:1px solid var(--line);color:var(--t1);font-size:13px;padding:7px 14px;border-radius:20px;font-family:inherit;outline:none;width:160px}
.search:focus{border-color:var(--acc)}

#reportRoot{}
.page{max-width:880px;margin:28px auto;background:linear-gradient(160deg,var(--card) 0%,var(--card2) 100%);border:1px solid var(--line);border-radius:18px;padding:34px 36px;position:relative;overflow:hidden;box-shadow:0 18px 48px -24px rgba(0,0,0,.6)}
.page::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--acc2),var(--acc));opacity:.85}
.p-head{display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:18px;border-bottom:1px solid var(--line2);margin-bottom:22px}
.ph-name{font-size:27px;font-weight:800;letter-spacing:-.01em}
.ph-meta{color:var(--t3);font-size:13.5px;margin-top:5px}
.ph-r{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.ph-tw{color:var(--t4);font-size:12px}
.trend{font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px}
.trend-up{background:rgba(134,217,176,.15);color:var(--g-hi)}
.trend-down{background:rgba(214,138,138,.15);color:var(--g-lo)}
.trend-keep{background:rgba(217,196,126,.15);color:var(--g-mid)}
.trend-single{background:rgba(127,164,148,.16);color:var(--t3)}
.pdf-btn{background:transparent;border:1px solid var(--acc);color:var(--acc2);font-size:11.5px;font-weight:600;padding:5px 12px;border-radius:7px;cursor:pointer;font-family:inherit;transition:.15s}
.pdf-btn:hover{background:var(--acc);color:#0c1f18}

.p-row1{display:grid;grid-template-columns:300px 1fr;gap:30px;margin-bottom:24px;align-items:center}
.spark{width:300px;height:72px}.spk-v{fill:var(--t2);font-size:10px;font-weight:600}.spk-x{fill:var(--t4);font-size:10px}
.blk-t{font-size:13px;color:var(--t3);font-weight:600;letter-spacing:.03em;margin-bottom:13px}
.blk-t.gold{color:var(--acc2)}
.blk-sub{color:var(--t4);font-weight:400;font-size:11.5px}
.donut-block{display:flex;flex-direction:column}
.donut-wrap{display:flex;align-items:center;gap:22px}
.donut{width:118px;height:118px;flex-shrink:0}
.donut-c-num{fill:var(--t1);font-size:21px;font-weight:800}
.donut-c-lab{fill:var(--t3);font-size:10px}
.donut-legend{display:flex;flex-direction:column;gap:9px;flex:1}
.lg-row{display:flex;align-items:center;gap:9px;font-size:13px}
.lg-dot{width:11px;height:11px;border-radius:3px;flex-shrink:0}
.lg-name{color:var(--t2);flex:1}
.lg-val{color:var(--t1);font-weight:700}
.donut-empty{color:var(--t4);font-size:13px;font-style:italic}
.blk{margin-bottom:20px}
.rtbl{width:100%;border-collapse:collapse;font-size:13px}
.rtbl th{text-align:left;color:var(--t3);font-weight:600;font-size:11.5px;padding:8px 11px;background:var(--card2);border-bottom:1px solid var(--line2)}
.rtbl td{padding:9px 11px;border-bottom:1px solid var(--line2);vertical-align:top}
.rc-r{width:42px;font-weight:700;color:var(--t2)}
.rc-s{width:96px;font-weight:700;white-space:nowrap}
.rc-g{color:var(--t2);font-size:12.5px;line-height:1.7}
.rc-x{width:150px;color:var(--acc2);font-size:12.5px;line-height:1.7}
.rc-empty td{color:var(--t4);font-style:italic}
.p-two{display:grid;grid-template-columns:1fr 1fr;gap:26px}
.weakbox{background:var(--card2);border:1px solid var(--line);border-left:3px solid var(--acc);border-radius:12px;padding:18px 20px}
.diag{background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:18px 20px}
.diag-list{list-style:none;display:flex;flex-direction:column;gap:9px}
.diag-list li{font-size:13.5px;color:var(--t2);padding-left:18px;position:relative;line-height:1.62}
.diag-list li::before{content:'';position:absolute;left:0;top:9px;width:6px;height:6px;border-radius:50%;background:var(--acc);opacity:.8}
.diag-list b{color:var(--t1);font-weight:700}
.timebox{background:var(--card2);border:1px solid var(--line);border-left:3px solid var(--acc);border-radius:10px;padding:15px 18px}
.tc{font-size:13.5px;color:var(--t2);line-height:1.6}.tc b{color:var(--acc2);font-weight:700}
.muted{color:var(--t4);font-size:12.5px}
.p-foot{display:flex;justify-content:space-between;align-items:center;margin-top:6px;padding-top:14px;border-top:1px solid var(--line2);font-size:11.5px}
.pf-m{color:var(--acc2);font-weight:600}.pf-n{color:var(--t4)}
.endnote{max-width:880px;margin:36px auto 80px;padding:0 24px;color:var(--t4);font-size:12px;text-align:center}
.empty-state{max-width:880px;margin:60px auto;text-align:center;color:var(--t3);font-size:15px}

/* 비밀번호 모달 */
.modal{position:fixed;inset:0;background:rgba(8,20,15,.85);backdrop-filter:blur(3px);z-index:10000;display:flex;align-items:center;justify-content:center}
.modal-box{background:var(--card);border:1px solid var(--line2);border-radius:16px;padding:32px 36px;width:min(400px,90vw)}
.modal-box h2{font-size:18px;margin-bottom:8px}
.modal-box p{font-size:13px;color:var(--t3);margin-bottom:18px}
.modal-box input{width:100%;background:var(--card2);border:1px solid var(--line2);color:var(--t1);font-size:14px;padding:11px 14px;border-radius:9px;font-family:inherit;outline:none;margin-bottom:14px}
.modal-box input:focus{border-color:var(--acc)}
.modal-box .err{color:var(--g-lo);font-size:12.5px;margin-bottom:12px;min-height:16px}
.modal-box button{width:100%;background:var(--acc);border:none;color:#0c1f18;font-size:14px;font-weight:700;padding:11px;border-radius:9px;cursor:pointer;font-family:inherit}
.modal-box button:disabled{opacity:.5}
.modal-box .remember{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--t3);margin-bottom:16px;cursor:pointer}

.pdf-overlay{position:fixed;inset:0;background:rgba(8,20,15,.78);backdrop-filter:blur(2px);z-index:9999;display:none;align-items:center;justify-content:center}
.pdf-overlay-box{display:flex;flex-direction:column;align-items:center;gap:16px;background:var(--card);border:1px solid var(--line2);border-radius:16px;padding:32px 44px}
.pdf-overlay-text{color:var(--t1);font-size:15px;font-weight:600}
.pdf-spinner{width:34px;height:34px;border:3px solid var(--line2);border-top-color:var(--acc);border-radius:50%;animation:pdfspin .8s linear infinite}
@keyframes pdfspin{to{transform:rotate(360deg)}}

@media print{
 body{background:#fff;color:#16261f}
 .top,.filters,.databar,.endnote,.no-print{display:none!important}
 .page{max-width:none;margin:0;border:none;border-radius:0;background:#fff;color:#16261f;page-break-after:always;padding:20px 0;box-shadow:none}
 .page::before{display:none}
}
@media(max-width:720px){.page{padding:24px 18px}.ph-name{font-size:22px}.p-row1{grid-template-columns:1fr}.spark{width:100%}.donut-wrap{flex-direction:column;align-items:flex-start}.p-two{grid-template-columns:1fr}}
</style></head><body>

<div class="top">
  <div class="eyebrow">가경 국어 연구소 · 강사용 실시간 리포트</div>
  <h1>이감 시즌3 <span class="dim">학생 진단 리포트</span></h1>
  <p>구글 시트에서 직접 데이터를 읽어옵니다. 새 회차·새 제출이 시트에 쌓이면 아래 '새로고침'만 누르면 즉시 반영됩니다. 학생 1명당 한 페이지.</p>
</div>

<div class="databar">
  <div class="status" id="statusText"><span class="dot" id="statusDot"></span>데이터를 불러오는 중…</div>
  <button class="rbtn" id="refreshBtn" onclick="loadData()">새로고침</button>
  <button class="rbtn ghost" id="logoutBtn" onclick="forgetPw()">비밀번호 변경</button>
</div>

<div class="filters" id="filters" style="display:none">
  <button class="fbtn on" data-f="all">전체</button>
  <button class="fbtn" data-f="4">4회 응시</button>
  <button class="fbtn" data-f="multi">다회차</button>
  <button class="fbtn" data-f="상승">상승</button>
  <button class="fbtn" data-f="하락">하락</button>
  <button class="fbtn fbtn-pdf" id="allPdfBtn" onclick="printAll()">전체 PDF 저장</button>
  <input class="search" id="searchBox" placeholder="이름 검색" oninput="searchStudent(this.value)">
</div>

<div id="reportRoot"></div>
<div class="endnote" id="endnote" style="display:none">가경T · 오름 국어 연구소 · 구글 시트 실시간 연동 · 강사 전용</div>

<!-- 비밀번호 모달 -->
<div class="modal" id="pwModal" style="display:none">
  <div class="modal-box">
    <h2>강사 인증</h2>
    <p>실시간 리포트를 보려면 비밀번호를 입력하세요.</p>
    <input type="password" id="pwInput" placeholder="비밀번호" onkeydown="if(event.key==='Enter')submitPw()">
    <label class="remember"><input type="checkbox" id="rememberPw" checked> 이 기기에서 비밀번호 기억</label>
    <div class="err" id="pwErr"></div>
    <button id="pwSubmit" onclick="submitPw()">확인</button>
  </div>
</div>

<div class="pdf-overlay no-print" id="pdfOverlay">
  <div class="pdf-overlay-box"><div class="pdf-spinner"></div><div class="pdf-overlay-text"></div></div>
</div>

<script>
// ─────────── 설정 ───────────
// 배포한 Apps Script 웹앱 URL (끝이 /exec). 람쥐님이 배포 후 이 값만 교체하세요.
var SCRIPT_URL = "PASTE_YOUR_APPS_SCRIPT_EXEC_URL";

// 시즌3 회차만 (필요하면 "2026-05" 추가)
var SEASON3_IDS = {"2027-s3-01":"1회","2027-s3-02":"2회","2027-s3-03":"3회","2027-s3-04":"4회"};
var RND_ORDER = ["2027-s3-01","2027-s3-02","2027-s3-03","2027-s3-04"];
var EXCLUDE_NAMES = {"실험용":1,"테스트":1,"클로드":1};
var ALIASES = {"지환":"신지환"};  // 별칭 통합
var PASS_KEY = "oreum_report_pw";
var STATE = { master: [], pw: null };

// ─────────── 데이터 로딩 ───────────
function getPw(){ return STATE.pw || localStorage.getItem(PASS_KEY) || null; }
function forgetPw(){ localStorage.removeItem(PASS_KEY); STATE.pw=null; openPwModal(); }
function openPwModal(){ document.getElementById('pwModal').style.display='flex';
  setTimeout(function(){ document.getElementById('pwInput').focus(); },50); }
function closePwModal(){ document.getElementById('pwModal').style.display='none'; }

function submitPw(){
  var v=document.getElementById('pwInput').value.trim();
  if(!v) return;
  STATE.pw=v;
  if(document.getElementById('rememberPw').checked) localStorage.setItem(PASS_KEY,v);
  document.getElementById('pwErr').textContent='';
  closePwModal();
  loadData();
}

function setStatus(txt, cls){
  document.getElementById('statusText').innerHTML='<span class="dot '+(cls||'')+'" id="statusDot"></span>'+txt;
}

async function loadData(){
  var pw=getPw();
  if(!pw){ openPwModal(); return; }
  if(SCRIPT_URL.indexOf('PASTE_YOUR')===0){
    setStatus('SCRIPT_URL이 아직 설정되지 않았습니다. HTML 상단의 SCRIPT_URL을 배포 URL로 교체하세요.', 'err');
    return;
  }
  var btn=document.getElementById('refreshBtn'); btn.disabled=true;
  setStatus('데이터를 불러오는 중…');
  try{
    var url=SCRIPT_URL+(SCRIPT_URL.indexOf('?')>=0?'&':'?')+'action=report&pw='+encodeURIComponent(pw)+'&t='+Date.now();
    var res=await fetch(url, {method:'GET'});
    var data=await res.json();
    if(!data.ok){
      if(data.error==='unauthorized'){
        setStatus('비밀번호가 올바르지 않습니다.', 'err');
        STATE.pw=null; localStorage.removeItem(PASS_KEY);
        document.getElementById('pwErr').textContent='비밀번호가 올바르지 않습니다.';
        openPwModal(); btn.disabled=false; return;
      }
      setStatus('데이터 오류: '+(data.error||'unknown'), 'err'); btn.disabled=false; return;
    }
    STATE.master = buildMaster(data.rows||[]);
    renderAll();
    var when=new Date(data.fetchedAt||Date.now());
    var hh=String(when.getHours()).padStart(2,'0'), mm=String(when.getMinutes()).padStart(2,'0');
    setStatus('<b>'+STATE.master.length+'명</b> 반영됨 · 마지막 동기화 '+hh+':'+mm+' · 시즌3 1~4회', 'live');
    document.getElementById('filters').style.display='';
    document.getElementById('endnote').style.display='';
  }catch(err){
    setStatus('불러오기 실패: '+(err.message||err)+' (CORS·배포 설정을 확인하세요)', 'err');
  }
  btn.disabled=false;
}

// ─────────── 집계 (gen_html4 로직 JS 포팅) ───────────
function areaOf(code){
  var m=/(common|hs|lm)-(\d+)/.exec(code);
  if(!m) return ["기타","기타"];
  var typ=m[1], n=parseInt(m[2],10);
  if(typ==="hs") return ["선택","화법과 작문"];
  if(typ==="lm") return ["선택","언어와 매체"];
  if(n<=17) return ["공통","독서"];
  return ["공통","문학"];
}
function parseWrongs(s){
  if(!s) return [];
  return String(s).split(",").map(function(x){return x.trim();}).filter(function(x){return /(common|hs|lm)-\d+/.test(x);});
}
function patLabels(s){
  if(!s) return [];
  return String(s).split("|").map(function(p){
    var seg=p.split(":"); var lab=seg.length>1?seg.slice(1).join(":"):seg[0];
    return lab.replace(/\s*약점.*$/,"").replace(/\(\d+번\)/,"").replace(/\(.*?\)/,"").trim();
  }).filter(Boolean);
}
function trendOf(raws){
  if(raws.length<2) return "단일";
  var d=raws[raws.length-1]-raws[0];
  return d>=8?"상승":d<=-8?"하락":"유지";
}

function buildMaster(rows){
  var students={};
  rows.forEach(function(r){
    var name=(r["이름"]||"").trim();
    if(!name || EXCLUDE_NAMES[name]) return;
    if(ALIASES[name]) name=ALIASES[name];
    var rid=(r["회차ID"]||"").trim();
    if(!SEASON3_IDS[rid]) return;  // 시즌3만
    var raw=parseInt(r["원점수"]||"0",10)||0;
    var grade=parseInt(r["예상등급"]||"0",10)||0;
    var wrongs=parseWrongs(r["틀린문항"]);
    var time=(r["시간진단"]||"").trim();
    var pats=patLabels(r["핵심패턴"]);
    var school=(r["학교"]||"").replace(/등학교$/,"고").replace(/\s+$/,"").trim();
    var sub=(r["선택과목"]||"").trim();
    if(!students[name]) students[name]={name:name,school:null,sub:null,rounds:{}};
    var st=students[name];
    // 같은 회차 중복 제출 시 최신(뒤 행)로 덮어씀 — 시트가 시간순이므로 마지막이 최신
    st.rounds[rid]={raw:raw,grade:grade,wrongs:wrongs,time:time,pats:pats};
    if(school && school!=="없음") st.school=school;
    if(sub) st.sub=sub;
  });

  var master=[];
  Object.keys(students).forEach(function(nm){
    var st=students[nm];
    var seq=RND_ORDER.filter(function(r){return st.rounds[r];});
    if(seq.length===0) return;
    var raws=seq.map(function(r){return st.rounds[r].raw;});
    var grades=seq.map(function(r){return st.rounds[r].grade;});
    var n=seq.length;
    var big={}, small={}, perRound=[], total=0;
    var appear={}; var timeSeq=[];
    RND_ORDER.forEach(function(r){
      if(!st.rounds[r]){ perRound.push(null); return; }
      var d=st.rounds[r]; var bc={},sc={};
      d.wrongs.forEach(function(w){
        var ar=areaOf(w), b=ar[0], s=ar[1];
        big[b]=(big[b]||0)+1; small[s]=(small[s]||0)+1; total++;
        bc[b]=(bc[b]||0)+1; sc[s]=(sc[s]||0)+1;
      });
      Object.keys(sc).forEach(function(s){ appear[s]=(appear[s]||0)+1; });
      if(d.time) timeSeq.push(d.time);
      perRound.push({raw:d.raw,grade:d.grade,wn:d.wrongs.length,time:d.time,wrongs:d.wrongs,big:bc,small:sc});
    });
    var bigPct={}, smallPct={};
    if(total){ Object.keys(big).forEach(function(k){bigPct[k]=Math.round(big[k]/total*100);});
               Object.keys(small).forEach(function(k){smallPct[k]=Math.round(small[k]/total*100);}); }
    // 반복 약점(영역)
    var recurring=[];
    Object.keys(small).sort(function(a,b){return small[b]-small[a];}).forEach(function(s){
      var ap=appear[s]||0;
      if(ap>=Math.max(2,Math.ceil((n+1)/2)) || (smallPct[s]||0)>=30)
        recurring.push({area:s,rounds:ap,cnt:small[s],pct:smallPct[s]||0});
    });
    // 1회차 약점 라벨
    var weakLabels = st.rounds["2027-s3-01"] ? st.rounds["2027-s3-01"].pats.slice() : [];
    // 시간
    var timeMode=""; if(timeSeq.length){ var c={},best=0; timeSeq.forEach(function(t){c[t]=(c[t]||0)+1; if(c[t]>best){best=c[t];timeMode=t;}}); }
    var allSame = timeSeq.length>=2 && timeSeq.every(function(t){return t===timeSeq[0];});

    master.push({name:nm,school:st.school,sub:st.sub,n:n,raws:raws,grades:grades,
      trend:trendOf(raws),total_wrong:total,big:big,small:small,big_pct:bigPct,small_pct:smallPct,
      per_round:perRound,recurring:recurring,weak_labels:weakLabels,
      time_seq:timeSeq,time_mode:timeMode,time_all_same:allSame});
  });
  master.sort(function(a,b){ if(b.n!==a.n) return b.n-a.n;
    var ga=a.grades[a.grades.length-1]||9, gb=b.grades[b.grades.length-1]||9;
    if(ga!==gb) return ga-gb; return a.name.localeCompare(b.name,'ko'); });
  return master;
}

// ─────────── 렌더 헬퍼 ───────────
function itemnum(c){var m=/(common|hs|lm)-(\d+)/.exec(c);return m?m[2]+"번":c;}
function gcol(g){if(g<=2)return"var(--g-hi)";if(g===3)return"var(--g-mid)";if(g<=4)return"var(--g-warn)";return"var(--g-lo)";}
function tlabel(t){return{"상승":"▲ 상승","하락":"▼ 하락","유지":"― 유지","단일":"단일 응시"}[t];}
function tcls(t){return{"상승":"up","하락":"down","유지":"keep","단일":"single"}[t];}
var TIME_DESC={"전체 시간 부족형":"시험 전체에서 시간에 쫓김 — 푸는 속도 자체가 병목","루틴 부재형":"풀이 순서·페이스 루틴이 잡히지 않음","고난도 집착형":"어려운 문항에 시간을 과투입 — 버리는 판단이 늦음","선택과목 지연형":"선택과목(화작/언매)에서 시간이 샘","독서 지연형":"독서 지문에서 시간이 과다 소모","문학 지연형":"문학에서 시간이 과다 소모","시간 안정형":"시간 운용이 안정적"};
function timeComment(m){
  var seq=m.time_seq; if(!seq.length) return null;
  var mode=m.time_mode, desc=TIME_DESC[mode]||mode;
  if(m.time_all_same && seq.length>=2) return seq.length+'개 회차 모두 <b>'+mode+'</b>으로 동일 — '+desc+'. 고착된 패턴이라 우선 교정 대상입니다.';
  var uniq={}; seq.forEach(function(t){uniq[t]=1;});
  if(Object.keys(uniq).length>1) return '회차별로 <b>'+seq.join(' → ')+'</b>으로 변동. 가장 잦은 형태는 '+mode+'('+desc+')입니다.';
  return '<b>'+mode+'</b> — '+desc+'.';
}
function donut(m){
  var sp=m.small_pct, bp=m.big_pct, segs=[];
  if(sp["독서"]) segs.push(["독서",sp["독서"],"var(--seg-dok)"]);
  if(sp["문학"]) segs.push(["문학",sp["문학"],"var(--seg-mun)"]);
  var sun=bp["선택"]||0;
  if(sun){ segs.push([m.sub==="lm"?"언어와 매체":"화법과 작문",sun,"var(--seg-sun)"]); }
  if(!segs.length) return '<div class="donut-empty">오답 없음</div>';
  var total=segs.reduce(function(a,s){return a+s[1];},0)||1;
  var R=52,CX=64,CY=64,SW=20,C=2*Math.PI*R,offset=0,arcs="";
  segs.forEach(function(s){var frac=s[1]/total,dash=C*frac,gap=C-dash;
    arcs+='<circle cx="'+CX+'" cy="'+CY+'" r="'+R+'" fill="none" stroke="'+s[2]+'" stroke-width="'+SW+'" stroke-dasharray="'+dash.toFixed(2)+' '+gap.toFixed(2)+'" stroke-dashoffset="'+(-offset).toFixed(2)+'" transform="rotate(-90 '+CX+' '+CY+')"/>';
    offset+=dash;});
  var gong=bp["공통"]||0;
  var center='<text x="'+CX+'" y="'+(CY-4)+'" text-anchor="middle" class="donut-c-num">'+gong+'%</text><text x="'+CX+'" y="'+(CY+13)+'" text-anchor="middle" class="donut-c-lab">공통</text>';
  var legend=segs.map(function(s){return '<div class="lg-row"><span class="lg-dot" style="background:'+s[2]+'"></span><span class="lg-name">'+s[0]+'</span><span class="lg-val">'+s[1]+'%</span></div>';}).join("");
  return '<div class="donut-wrap"><svg viewBox="0 0 128 128" class="donut"><circle cx="'+CX+'" cy="'+CY+'" r="'+R+'" fill="none" stroke="var(--donut-track)" stroke-width="'+SW+'"/>'+arcs+center+'</svg><div class="donut-legend">'+legend+'</div></div>';
}
function integratedWeakness(m){
  var out=[],n=m.n,rec=m.recurring;
  if(rec.length){var top=rec[0];
    var kw=(top.rounds===n&&n>=2)?"응시한 모든 회차에서":(n+"회 중 "+top.rounds+"회에서");
    out.push('<b>'+top.area+'</b>가 가장 고질적입니다 — '+kw+' 반복 출현, 누적 오답의 '+top.pct+'%를 차지합니다. 단발 실수가 아니라 구조적으로 약한 영역입니다.');
    if(rec.length>=2&&rec[1].pct>=20) out.push('그다음은 <b>'+rec[1].area+'</b>('+rec[1].pct+'%)로, 여기서도 회차마다 일정하게 실점이 나옵니다.');
  }
  if(m.weak_labels.length){var seen=[];m.weak_labels.forEach(function(l){if(seen.indexOf(l)<0)seen.push(l);});
    out.push('세부 유형으로는 '+seen.slice(0,4).join(" · ")+' 쪽에서 약점이 드러납니다.');}
  if(n>=2){
    if(m.trend==="상승") out.push('점수는 우상향('+m.raws[0]+'→'+m.raws[m.raws.length-1]+'점)이지만 위 영역의 누수는 회차 내내 줄지 않았습니다. 이 약점을 직접 잡으면 추가 상승 여지가 큽니다.');
    else if(m.trend==="하락") out.push('점수 하락('+m.raws[0]+'→'+m.raws[m.raws.length-1]+'점)과 맞물려 위 약점이 최근 회차에서 더 도드라집니다. 우선순위로 보강해야 합니다.');
    else out.push('점수는 '+m.grades[0]+'~'+m.grades[m.grades.length-1]+'등급대에서 정체 중인데, 그 원인이 위 영역의 반복 실점입니다. 여길 뚫어야 등급이 한 칸 움직입니다.');
  } else if(m.weak_labels.length) out.push('1회 단일 응시라 추이는 아직 없지만, 위 유형은 다음 회차에서도 재발 가능성이 높아 미리 잡아두는 게 좋습니다.');
  return out;
}
function diagnose(m){
  var parts=[],raws=m.raws,grades=m.grades,n=m.n;
  if(n>=2){var d=raws[raws.length-1]-raws[0];
    if(m.trend==="상승")parts.push('1회 '+raws[0]+'점 → 최근 '+raws[raws.length-1]+'점, <b>'+d+'점 상승</b>('+grades[0]+'→'+grades[grades.length-1]+'등급). 우상향이라 현재 방향 유지하며 변별만 추가로 잡으면 됩니다.');
    else if(m.trend==="하락")parts.push('1회 '+raws[0]+'점 → 최근 '+raws[raws.length-1]+'점, <b>'+Math.abs(d)+'점 하락</b>('+grades[0]+'→'+grades[grades.length-1]+'등급). 회차 난도 상승인지 시간 붕괴인지 분리 진단 필요.');
    else parts.push(raws.join("→")+'점, '+grades[0]+'~'+grades[grades.length-1]+'등급대 <b>유지</b>.');
  } else parts.push(raws[0]+'점·'+grades[grades.length-1]+'등급 단일 응시. 다음 회차부터 추이 비교 가능.');
  var bp=m.big_pct, sm=m.small_pct;
  if(Object.keys(bp).length){var gong=bp["공통"]||0,sun=bp["선택"]||0;
    if(gong>=sun){var sd=[];if(sm["독서"])sd.push('독서 '+sm["독서"]+'%');if(sm["문학"])sd.push('문학 '+sm["문학"]+'%');
      parts.push('오답의 <b>'+gong+'%가 공통(독서·문학)</b>에 몰려 있습니다('+sd.join(" · ")+'). 공통 독해력이 1순위 과제입니다.');
    } else parts.push('오답의 <b>'+sun+'%가 선택('+(m.sub==="lm"?"언어와 매체":"화법과 작문")+')</b>에 몰려 있습니다. 선택과목 집중 보강이 효율적입니다.');
  }
  return parts;
}
function spark(m){
  var W=300,H=72,pad=10,bw=34,n=RND_ORDER.length,gap=(W-2*pad-bw*n)/(n-1),bars="";
  RND_ORDER.forEach(function(r,i){var x=pad+i*(bw+gap),pr=m.per_round[i];
    if(pr){var v=pr.raw,g=pr.grade,bh=(v/100)*(H-22),y=H-bh-14;
      bars+='<rect x="'+x.toFixed(0)+'" y="'+y.toFixed(1)+'" width="'+bw+'" height="'+bh.toFixed(1)+'" rx="2" fill="'+gcol(g)+'" opacity=".9"/>';
      bars+='<text x="'+(x+bw/2).toFixed(0)+'" y="'+(y-3).toFixed(0)+'" text-anchor="middle" class="spk-v">'+v+'</text>';
    } else bars+='<rect x="'+x.toFixed(0)+'" y="'+(H-16)+'" width="'+bw+'" height="2" fill="#2e4a40"/>';
    bars+='<text x="'+(x+bw/2).toFixed(0)+'" y="'+(H-2)+'" text-anchor="middle" class="spk-x">'+SEASON3_IDS[r]+'</text>';});
  var base=H-(80/100)*(H-22)-14;
  return '<svg viewBox="0 0 '+W+' '+H+'" class="spark"><line x1="'+pad+'" y1="'+base.toFixed(1)+'" x2="'+(W-pad)+'" y2="'+base.toFixed(1)+'" stroke="#3a5a4c" stroke-dasharray="3 3"/>'+bars+'</svg>';
}
function roundRows(m){
  var rows="";
  RND_ORDER.forEach(function(r,i){var pr=m.per_round[i];
    if(pr){
      var gong=pr.wrongs.filter(function(w){return w.indexOf("common")===0;}).sort(function(a,b){return parseInt(/\d+/.exec(a))-parseInt(/\d+/.exec(b));});
      var sun=pr.wrongs.filter(function(w){return w.indexOf("common")!==0;}).sort(function(a,b){return parseInt(/\d+/.exec(a))-parseInt(/\d+/.exec(b));});
      rows+='<tr><td class="rc-r">'+SEASON3_IDS[r]+'</td><td class="rc-s" style="color:'+gcol(pr.grade)+'">'+pr.raw+'·'+pr.grade+'등급</td><td class="rc-g">'+(gong.length?gong.map(itemnum).join(", "):"—")+'</td><td class="rc-x">'+(sun.length?sun.map(itemnum).join(", "):"—")+'</td></tr>';
    } else rows+='<tr class="rc-empty"><td class="rc-r">'+SEASON3_IDS[r]+'</td><td colspan="3">미응시</td></tr>';
  });
  return rows;
}

  var html="";
  STATE.master.forEach(function(m,i){
    var school=m.school||"—", sub=m.sub==="lm"?"언매":"화작";

    var timeBlock=tc?'<div class="tc">'+tc+'</div>':'<div class="tc muted">시간 진단 데이터 없음</div>';
    var diag=diagnose(m).map(function(d){return '<li>'+d+'</li>';}).join("");

      +'<button class="pdf-btn no-print" onclick="printStudent(\''+sid+'\')">이 학생 PDF 저장</button></div></div>'
      +'<div class="p-row1"><div class="spark-box">'+spark(m)+'</div>'

      +'<div class="blk"><div class="blk-t">회차별 오답 <span class="blk-sub">(공통 = 독서·문학 1~34 / 선택 = 화작·언매 35~45)</span></div>'
      +'<table class="rtbl"><thead><tr><th>회차</th><th>점수</th><th>공통(1~34)</th><th>선택(35~45)</th></tr></thead><tbody>'+roundRows(m)+'</tbody></table></div>'
      +'<div class="blk weakbox"><div class="blk-t gold">진단 약점 <span class="blk-sub">(1~4회 통합 분석)</span></div><ul class="diag-list">'+integ+'</ul></div>'
      +'<div class="blk timebox"><div class="blk-t gold">시간 관리</div>'+timeBlock+'</div>'
      +'<div class="blk diag"><div class="blk-t gold">진단 종합</div><ul class="diag-list">'+diag+'</ul></div>'
      +'<div class="p-foot"><span class="pf-m">가경T · 오름 국어 연구소</span><span class="pf-n">'+(i+1)+' / '+STATE.master.length+'</span></div></section>';
  });
  root.innerHTML=html;
  // 필터 초기화
  document.querySelectorAll('.fbtn[data-f]').forEach(function(b){b.classList.toggle('on',b.dataset.f==='all');});
  var sb=document.getElementById('searchBox'); if(sb) sb.value='';
}

// ─────────── PDF (캡처 방식) ───────────
function getJsPDF(){ if(window.jspdf&&window.jspdf.jsPDF)return window.jspdf.jsPDF; if(window.jsPDF)return window.jsPDF; return null; }
function libsReady(){ return !!(window.html2canvas&&getJsPDF()); }
async function captureCard(target){
  var btn=target.querySelector('.pdf-btn'); var prev=btn?btn.style.visibility:'';
  if(btn) btn.style.visibility='hidden';
  var canvas=await html2canvas(target,{scale:2,backgroundColor:'#0c1f18',useCORS:true,logging:false,windowWidth:target.scrollWidth});
  if(btn) btn.style.visibility=prev; return canvas;
}
function placeOnA4(pdf,canvas,first){var pw=210,ph=297;if(!first)pdf.addPage();pdf.setFillColor(12,31,24);pdf.rect(0,0,pw,ph,'F');
  var ratio=canvas.height/canvas.width,w=pw,h=w*ratio;if(h>ph){h=ph;w=h/ratio;}var x=(pw-w)/2,y=(ph-h)/2;
  pdf.addImage(canvas.toDataURL('image/jpeg',0.92),'JPEG',x,y,w,h);}
async function printStudent(id){
  var t=document.getElementById(id); if(!t)return;
  if(!libsReady()){alert('PDF 기능을 불러오지 못했습니다. 새로고침 후 다시 시도하세요.');return;}
  var name=t.dataset.name||'학생'; showOverlay(name+' PDF 생성 중…');
  try{if(document.fonts&&document.fonts.ready)await document.fonts.ready;}catch(e){}
  await new Promise(function(r){setTimeout(r,120);});
  try{var canvas=await captureCard(t);var jsPDF=getJsPDF();var ratio=canvas.height/canvas.width;
    var pdf=new jsPDF({orientation:(210*ratio)>=210?'portrait':'landscape',unit:'mm',format:[210,210*ratio]});
    pdf.setFillColor(12,31,24);pdf.rect(0,0,210,210*ratio,'F');pdf.addImage(canvas.toDataURL('image/jpeg',0.95),'JPEG',0,0,210,210*ratio);
    pdf.save('오름_시즌3_'+name+'_진단리포트.pdf');
  }catch(err){alert('PDF 생성 오류: '+(err.message||err));}finally{hideOverlay();}
}
async function printAll(){
  if(!libsReady()){alert('PDF 기능을 불러오지 못했습니다. 새로고침 후 다시 시도하세요.');return;}
  var cards=[].slice.call(document.querySelectorAll('.page')).filter(function(p){return getComputedStyle(p).display!=='none';});
  if(!cards.length){alert('표시된 학생이 없습니다.');return;}
  var btn=document.getElementById('allPdfBtn');if(btn)btn.disabled=true;
  showOverlay('전체 PDF 생성 준비 중… (0/'+cards.length+')');
  try{if(document.fonts&&document.fonts.ready)await document.fonts.ready;}catch(e){}
  await new Promise(function(r){setTimeout(r,150);});
  try{var jsPDF=getJsPDF();var pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    for(var i=0;i<cards.length;i++){var name=cards[i].dataset.name||('학생'+(i+1));
      showOverlay('전체 PDF 생성 중… ('+(i+1)+'/'+cards.length+') · '+name);
      await new Promise(function(r){setTimeout(r,20);});
      var canvas=await captureCard(cards[i]); placeOnA4(pdf,canvas,i===0); canvas.width=0;canvas.height=0;}
    showOverlay('PDF 저장 중…'); await new Promise(function(r){setTimeout(r,30);});
    pdf.save('오름_시즌3_학생별_개별리포트_전체.pdf');
  }catch(err){alert('전체 PDF 오류: '+(err.message||err));}finally{if(btn)btn.disabled=false;hideOverlay();}
}
function showOverlay(t){var ov=document.getElementById('pdfOverlay');ov.querySelector('.pdf-overlay-text').textContent=t||'PDF 생성 중…';ov.style.display='flex';}
function hideOverlay(){document.getElementById('pdfOverlay').style.display='none';}
